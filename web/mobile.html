<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#163642" />
  <title>stemsplat</title>

  <!-- nunito sans -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- tailwind (cdn build) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --bg-1: #0F2027;   /* emerald dusk left */
      --bg-2: #2C5364;   /* emerald dusk right */
      --txt-main: #E7ECEF;
      --txt-dim: #B8C4CC;
      --accent:  #8ED8FF; /* subtle cyan accent for highlights only */
      --icon:   #9BB6C2;
      --card: rgba(23, 35, 41, 0.55);
      --card-done: rgba(40, 66, 77, 0.70);
      --border: rgba(255,255,255,0.06);
    }
    /* Animated light blur for settings overlay BACKGROUND (not the card) */
    @keyframes overlayBlurIn {
      from { backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px); background-color: rgba(0, 0, 0, 0.0); }
      to   { backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); background-color: rgba(0, 0, 0, 0.35); }
    }
    .overlay-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      backdrop-filter: blur(0px);
      -webkit-backdrop-filter: blur(0px);
      background-color: rgba(0, 0, 0, 0.0);
    }
    .overlay-bg.anim     { animation: overlayBlurIn .28s ease both; }
    @keyframes overlayBlurOut {
      from { backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); background-color: rgba(0, 0, 0, 0.35); }
      to   { backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px); background-color: rgba(0, 0, 0, 0.0); }
    }
    .overlay-bg.anim-out { animation: overlayBlurOut 0.18s ease both; }
    @keyframes settingsCardIn {
      from { opacity: 0; transform: translateY(8px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0)    scale(1.00); }
    }
    @keyframes settingsCardOut {
      from { opacity: 1; transform: translateY(0)    scale(1.00); }
      to   { opacity: 0; transform: translateY(6px)  scale(0.98); }
    }
    .settings-card-in  { animation: settingsCardIn  .28s cubic-bezier(.2,.7,.2,1) both; }
    .settings-card-out { animation: settingsCardOut .18s ease both; }

    html, body { min-height: 100%; height: 100%; }
    html {
      background: linear-gradient(135deg, #0B1A1F 0%, var(--bg-1) 35%, var(--bg-2) 100%);
      scrollbar-width: none;
      -ms-overflow-style: none;
      overflow: hidden;
      overscroll-behavior: none;
    }
    body {
      padding: 0;
      overscroll-behavior: none;
      background: linear-gradient(135deg, #0B1A1F 0%, var(--bg-1) 35%, var(--bg-2) 100%);
      overflow: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    html::-webkit-scrollbar,
    body::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }
    body.desktop-shell .window-chrome { display: flex; }
    .bg-gradient-shell {
      position: fixed;
      left: 0;
      right: 0;
      top: -22vh;
      bottom: -22vh;
      pointer-events: none;
      z-index: -3;
      background: linear-gradient(135deg, #0B1A1F 0%, var(--bg-1) 35%, var(--bg-2) 100%);
    }
    .window-chrome {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 46px;
      padding: 8px 12px 0;
      z-index: 24;
      align-items: flex-start;
      pointer-events: none;
    }
    .window-dragbar {
      width: 100%;
      height: 28px;
      display: flex;
      align-items: center;
      pointer-events: auto;
    }
    .window-controls-shell {
      position: relative;
      display: flex;
      align-items: center;
      min-width: 56px;
      height: 18px;
      padding: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }
    .window-controls {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .window-control {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 0;
      padding: 0;
      cursor: pointer;
      position: relative;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.12);
    }
    .window-control:hover::after {
      content: attr(data-glyph);
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 11px;
      line-height: 1;
      color: rgba(0,0,0,.62);
      font-weight: 800;
    }
    .window-control.close { background: #ff5f57; }
    .window-control.minimize { background: #febc2e; }
    .window-control.fullscreen { background: #28c840; }

    .noise::before { content: ""; position: fixed; inset: -22vh 0; pointer-events: none;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/></filter><rect width="120" height="120" filter="url(%23n)" opacity="0.035"/></svg>') repeat; opacity:.18; }
    .shade { position: fixed; inset: -22vh 0; pointer-events: none; background: rgba(0,0,0,0.24); z-index: -1; }
    .app-shell {
      min-height: 100vh;
      max-height: 100vh;
      width: 100%;
      padding: clamp(72px, 9vh, 108px) 0 clamp(72px, 9vh, 108px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior-y: none;
      -webkit-overflow-scrolling: touch;
      transition: transform .28s cubic-bezier(.22,.61,.36,1), opacity .28s cubic-bezier(.22,.61,.36,1), padding .28s ease;
      will-change: transform, opacity;
    }
    .app-shell::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }
    .app-shell.compact {
      justify-content: center;
      padding-top: clamp(108px, 13vh, 150px);
      padding-bottom: clamp(86px, 10vh, 122px);
    }
    .app-shell.expanded {
      justify-content: flex-start;
    }
    .app-shell.resetting-out {
      opacity: 0;
      transform: translateY(-18px);
    }
    .app-shell.resetting-in {
      opacity: 0;
      transform: translateY(18px);
    }

    .glass { background: var(--card); backdrop-filter: blur(12px) saturate(110%); -webkit-backdrop-filter: blur(12px) saturate(110%); border: 1px solid var(--border); box-shadow: 0 8px 26px rgba(0,0,0,.28); }
    .glass-light { background: rgba(255,255,255,0.12); backdrop-filter: blur(10px) saturate(110%); -webkit-backdrop-filter: blur(10px) saturate(110%); border: 1px solid rgba(255,255,255,0.18); box-shadow: 0 8px 26px rgba(0,0,0,.28); }
    .card   { position: relative; overflow: visible; transition: background .20s ease; will-change: transform, opacity; transform: translateZ(0); contain: paint; flex-shrink: 0; }
    .card:hover { box-shadow: 0 8px 26px rgba(0,0,0,.28); }
    .card:has(.dl-pad:hover):hover { box-shadow: 0 12px 40px rgba(0,0,0,.35); }
    .card.done { background: var(--card-done); }
    .card-body { display:flex; align-items:center; gap:14px; min-width:0; }
    .card-copy { flex:1; min-width:0; display:flex; flex-direction:column; gap:12px; }
    .filename-wrap { min-width:0; }
    .artwork-shell {
      position: relative;
      flex: 0 0 60px;
      width: 60px;
      height: 60px;
      border-radius: 14px;
      overflow: hidden;
      background: linear-gradient(145deg, rgba(255,255,255,.14), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
      transition: filter .2s ease, transform .2s ease, opacity .2s ease;
    }
    .artwork-img,
    .artwork-fallback {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .artwork-img {
      object-fit: cover;
      display: block;
      transition: opacity .2s ease, filter .2s ease;
    }
    .artwork-fallback {
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: 24px;
      color: rgba(255,255,255,.84);
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.18), rgba(255,255,255,0) 55%),
        linear-gradient(145deg, rgba(19,40,49,.95), rgba(9,23,30,.95));
      transition: opacity .2s ease, filter .2s ease;
    }
    .artwork-shell.has-image .artwork-fallback { opacity: 0; }
    .artwork-shell.is-dim .artwork-img,
    .artwork-shell.is-dim .artwork-fallback { filter: brightness(.48) saturate(.78); }
    .status-wrap { flex: 0 0 auto; display:flex; align-items:center; }

    #title { letter-spacing: 0.5px; text-shadow: 0 8px 40px rgba(0,0,0,.45); }

    .fade-in { animation: fade .7s ease forwards; }
    @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .btn { display:inline-flex; align-items:center; justify-content:center; border-radius:12px; padding:6px 10px; font-size:12px; font-weight:600; transition: transform .15s ease, box-shadow .15s ease; }
    .btn:focus { outline: 2px solid rgba(255,255,255,.25); outline-offset: 2px; }
    .btn:hover { transform: translateY(-1px); }
    .btn[hidden] { display:none !important; }
    .btn[disabled] { opacity:.55; cursor:default; transform:none !important; }
    #start-btn:disabled {
      pointer-events: none;
      cursor: default;
      opacity: .42;
      filter: grayscale(.2);
    }

    @keyframes modelAttention {
      0%, 18%, 100% { transform: translateX(0); box-shadow: 0 0 0 0 rgba(255,255,255,0); }
      4% { transform: translateX(-1px); }
      8% { transform: translateX(2px); }
      12% { transform: translateX(-1.5px); }
      16% { transform: translateX(1px); }
      28% { box-shadow: 0 0 0 0 rgba(255,255,255,.2); }
      50% { box-shadow: 0 0 0 12px rgba(255,255,255,0); }
      62% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
    }
    .attention-sequence { animation: modelAttention 2.5s ease-in-out infinite; }
    .attention-ring { box-shadow: 0 0 0 2px rgba(255,255,255,.45), 0 0 24px rgba(255,255,255,.18); }
    .dimmed-control { opacity:.45; pointer-events:none; }
    .copy-button { width: 28px; height: 28px; border-radius: 999px; border: 1px solid rgba(255,255,255,.14); background: rgba(255,255,255,.10); display: inline-flex; align-items: center; justify-content: center; color: var(--txt-main); transition: transform .15s ease, background .15s ease, box-shadow .15s ease; }
    .copy-button:hover { transform: translateY(-1px); background: rgba(255,255,255,.16); box-shadow: 0 8px 18px rgba(0,0,0,.2); }
    .copy-button svg { position:absolute; inset:0; margin:auto; width:16px; height:16px; transition: opacity .18s ease; }
    .copy-button .icon-wrap { position:relative; width:16px; height:16px; display:block; }
    .copy-button .icon-check { opacity:0; }
    .copy-button[data-copied="1"] .icon-copy { opacity:0; }
    .copy-button[data-copied="1"] .icon-check { opacity:1; }
    .settings-row { display:flex; align-items:center; gap:10px; }
    .model-list { display:flex; flex-direction:column; gap:10px; }
    .model-item { display:flex; align-items:center; gap:10px; font-size:13px; color: var(--txt-main); }
    .model-state { width:18px; height:18px; border-radius:999px; border:1px solid rgba(255,255,255,.18); background: rgba(255,255,255,.06); display:flex; align-items:center; justify-content:center; color:#b9f4d7; }
    .model-state svg { width:12px; height:12px; opacity:0; transition: opacity .18s ease; }
    .model-item.ready .model-state svg { opacity:1; }
    .model-note { font-size:12px; opacity:.65; }
    .models-cta-wrap { position:relative; display:flex; gap:8px; }
    .models-cta-wrap > * { position:relative; z-index:1; }
    .settings-disclosure {
      width: 100%;
      display:flex;
      align-items:center;
      gap:10px;
      padding: 2px 0;
      background: transparent;
      border: 0;
      color: var(--txt-main);
      text-align:left;
      font-size: 14px;
      opacity: .86;
      transition: opacity .16s ease, transform .16s ease;
    }
    .settings-disclosure:hover { opacity: 1; transform: translateX(1px); }
    .settings-disclosure-caret {
      width: 14px;
      height: 14px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      color: rgba(255,255,255,.82);
      transform: rotate(0deg);
      transition: transform .22s ease, opacity .16s ease;
      flex: 0 0 auto;
    }
    .settings-disclosure[aria-expanded="true"] .settings-disclosure-caret {
      transform: rotate(90deg);
    }
    .nerd-stuff-wrap {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transform: translateY(-8px);
      transition: max-height .28s cubic-bezier(.22,.61,.36,1), opacity .22s ease, transform .22s ease, margin-top .22s ease;
      will-change: max-height, opacity, transform;
      margin-top: 0;
    }
    .nerd-stuff-wrap.open {
      opacity: 1;
      transform: translateY(0);
      margin-top: 8px;
    }
    .nerd-stuff-panel {
      display:flex;
      flex-direction:column;
      gap:16px;
      padding-top: 4px;
    }

    .chip { font-size:11px; padding:3px 8px; border-radius:999px; color: #ffffff; background: rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.18); display:inline-flex; align-items:center; white-space:nowrap; flex-shrink:0; line-height:1; }
    .chip-dim { background: rgba(0,0,0,.38); border:1px solid rgba(255,255,255,.10); color:#E7ECEF; }

    .bar { height: 10px; background: rgba(255,255,255,.08); border-radius:999px; overflow: hidden; }
    .bar-fill { height:100%; width:0%; background: linear-gradient(90deg, #e7eef2, #dfe7ec); will-change: width; }

    /* pretty checkboxes */
    input.pretty{ appearance:none; -webkit-appearance:none; width:18px; height:18px; border:1.5px solid rgba(255,255,255,.35); border-radius:6px; background: transparent; display:inline-grid; place-items:center; transition: all .18s ease; }
    input.pretty:hover{ border-color: rgba(255,255,255,.6); box-shadow: 0 0 0 3px rgba(255,255,255,.06) inset; }
    input.pretty:checked{ background: linear-gradient(135deg, #96c5d6, #5fa3b5); border-color: transparent; }
    input.pretty:checked::after{ content:""; width:6px; height:10px; border:2px solid #0F2027; border-top:0; border-left:0; transform: rotate(45deg); }
    .stem-choice {
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.03);
      color: var(--txt-main);
      text-align: left;
      padding: 9px 12px;
      font-size: 15px;
      line-height: 1.15;
      transition: background .16s ease, border-color .16s ease, transform .16s ease, box-shadow .16s ease, color .16s ease;
    }
    .stem-choice:hover { transform: translateY(-1px); border-color: rgba(255,255,255,.24); background: rgba(255,255,255,.06); }
    .stem-choice.active {
      background: linear-gradient(135deg, rgba(150,197,214,.34), rgba(95,163,181,.26));
      border-color: rgba(150,197,214,.75);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.14), 0 10px 20px rgba(0,0,0,.18);
      color: #f5fbff;
    }

    #top-vig, #bot-vig { pointer-events:none; position:fixed; left:0; right:0; height:48px; background:linear-gradient(to bottom,rgba(0,0,0,.45),transparent); opacity:0; transition:opacity .25s ease; }
    #top-vig{ top:0; bottom:auto; transform:none; }
    #bot-vig{ top:auto; bottom:0; transform:rotate(180deg); }

    .dl-pad,
    .stop-pad { width:56px; height:56px; border-radius:14px; background: rgba(255,255,255,0.95); color:#0F2027; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 20px rgba(0,0,0,.28); opacity:0; transform: translateX(-10px); transition: opacity .42s ease, transform .42s ease, box-shadow .20s ease; pointer-events:none; align-self: center; position: absolute; top: 50%; transform: translateY(-50%); }
    .dl-pad.show,
    .stop-pad.show { opacity:1; transform: translateX(0) translateY(-50%); pointer-events:auto; }
    .dl-pad:hover,
    .stop-pad:hover { box-shadow:0 12px 30px rgba(0,0,0,.35); }
    .item-row { position: relative; padding-right: 84px; }
    .dl-pad { right: 12px; }
    .stop-pad { right: 12px; }
    .dl-pad svg, .stop-pad svg { display:block; margin:auto; }

    @keyframes breathe { 0%{transform:translateY(0)} 50%{transform:translateY(-2px)} 100%{transform:translateY(0)} }
    .micro { animation: breathe 3s ease-in-out infinite; }
    .slide-out { opacity: 0; transform: translateY(-10px); transition: transform .35s ease-in-out, opacity .35s ease-in-out; }
    .enter-pre { opacity: 0; transform: translateY(8px); }
    .enter-active { opacity: 1; transform: translateY(0); transition: transform .35s ease-in-out, opacity .35s ease-in-out; }
    /* leave/fade/slide transition for queue items */
    .leave { opacity: 1; transform: translateY(0); }
    .leave-active { transition: transform .16s ease-in-out, opacity .16s ease-in-out; }
    .leave-to { opacity: 0; transform: translateY(-2px); }
    #clear-btn { opacity: 0; transition: opacity .25s ease; }
    #clear-btn.show { opacity: 1; }
    #queue-spacer { height: 0; transition: height .18s ease-in-out; will-change: height; }
    .fade { transition: opacity .20s ease; }

    
    .page-mask { position:fixed; inset:0; background: rgba(0,0,0,0.0); pointer-events:none; opacity:0; transition: opacity .28s ease; }
    .page-mask.show { opacity:1; }
@media (prefers-reduced-motion: reduce){ .fade-in{ animation:none; } .btn:hover{ transform:none; } .card:hover{ transform:none; } .micro{ animation:none; } }
    body.mobile-lan .window-chrome { display: none !important; }
    body.mobile-lan {
      min-height: 100svh;
      background: linear-gradient(135deg, #0B1A1F 0%, var(--bg-1) 35%, var(--bg-2) 100%);

    body.mobile-lan .noise::before,
    body.mobile-lan .shade,
    body.mobile-lan .bg-gradient-shell { inset: -28vh 0; }

      width: 100%;
      gap: 18px;
    }
    body.mobile-lan .app-shell.compact {
      min-height: 100svh;
      justify-content: center;

    body.mobile-lan #settings-card {
      width: min(94vw, 680px);

    body.mobile-lan #settings-card .flex.gap-2,

    body.mobile-lan #settings-card .btn {

    }

  <script>
    /* helpers */
    const MAX_TASKS = 50;
    const STORAGE_WARN_GB = 1;
    const STORAGE_BLOCK_GB = 0.5;
    const MEMORY_LIMIT_RATIO = 0.9;
    const MEMORY_LIMIT_MB = 700;
    const FIVE_HOURS_SEC = 5 * 60 * 60;
    const LONG_TRACK_SEC = 15 * 60;

    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('file-input');
    const stemChoices = document.getElementById('stem-choices');
    const vocalsBox = document.getElementById('vocals-box');
    const instBox   = document.getElementById('inst-box');

    const appShell  = document.getElementById('app-shell');

    const windowCloseBtn = document.getElementById('window-close-btn');
    const windowMinimizeBtn = document.getElementById('window-minimize-btn');
    const windowFullscreenBtn = document.getElementById('window-fullscreen-btn');
    let outputFormatSelect = null;

    let modelsProgressMeta = null;

    let storageBlocked = false;
    let memoryBlocked = false;
    let modelsBlocked = false;
    let lastStorageWarning = 0;
    let lastMemoryWarning = 0;

    let activePortOverlay = null;

    let startPressed = false;

    let settingsState = { output_root: '', structure_mode: 'flat', output_format: 'same_as_input', video_handling: 'audio_only', runtime: null };

    function applyDesktopShellState(){
      const hasDesktopApi = !!(window.pywebview && window.pywebview.api);
      document.body.classList.toggle('desktop-shell', hasDesktopApi);
    }

    function updateStemChoiceUI(){
      [vocalsBox, instBox, deuxBox].forEach((button) => {
        if(!button) return;
        const active = selectedStemModes.has(button.dataset.mode || '');
        button.classList.toggle('active', active);
        button.setAttribute('aria-pressed', active ? 'true' : 'false');
      });
    }

    async function callDesktopAction(actionName){
      try{
        if(window.pywebview && window.pywebview.api && typeof window.pywebview.api[actionName] === 'function'){
          await window.pywebview.api[actionName]();
          return true;
        }
      }catch(err){
        console.warn(`${actionName} failed`, err);
      }
      return false;
    }

    updateStartButton();
    function updateStartButton(){
      if(!startBtn) return;
      const hasItems = queue.children.length > 0;
      if(!hasItems || startLock || storageBlocked || memoryBlocked || modelsBlocked){
        startBtn.disabled = true;
        const icon = startBtn.querySelector('svg');
        if(icon){ icon.style.animation = 'none'; }
      }else{
        startBtn.disabled = false;
        const icon = startBtn.querySelector('svg');
        if(icon){ icon.style.animation = ''; }
      }

    function applySettingsUI(){
      if(outputFormatSelect){
        outputFormatSelect.value = settingsState.output_format || 'same_as_input';
      }
      if(videoAudioOnly){
        videoAudioOnly.checked = true;
      }
      if(outputSameAsInput){

      }
      if(outputFolderInput){
        outputFolderInput.value = settingsState.output_root || '';
        outputFolderInput.classList.toggle('dimmed-control', !!settingsState.output_same_as_input);

        outputFolderChoose.classList.toggle('dimmed-control', !!settingsState.output_same_as_input);
      }
      if(outputFolderOpen){
        outputFolderOpen.classList.toggle('dimmed-control', !!settingsState.output_same_as_input);
      }
      applyRuntimeUI(settingsState.runtime || null);
    }

    function setNerdStuffExpanded(expanded, { immediate = false } = {}){
      nerdStuffExpanded = !!expanded;
      if(nerdStuffToggle){
        nerdStuffToggle.setAttribute('aria-expanded', nerdStuffExpanded ? 'true' : 'false');
      }
      if(!nerdStuffWrap) return;
      const targetHeight = nerdStuffExpanded ? `${nerdStuffWrap.scrollHeight}px` : '0px';
      if(immediate){
        nerdStuffWrap.classList.toggle('open', nerdStuffExpanded);
        nerdStuffWrap.style.maxHeight = targetHeight;
        return;
      }
      if(nerdStuffExpanded){
        nerdStuffWrap.classList.add('open');
        nerdStuffWrap.style.maxHeight = `${nerdStuffWrap.scrollHeight}px`;
        requestAnimationFrame(() => {
          if(nerdStuffWrap && nerdStuffExpanded){
            nerdStuffWrap.style.maxHeight = `${nerdStuffWrap.scrollHeight}px`;
          }
        });
      }else{
        nerdStuffWrap.style.maxHeight = `${nerdStuffWrap.scrollHeight}px`;
        requestAnimationFrame(() => {
          if(!nerdStuffWrap) return;
          nerdStuffWrap.classList.remove('open');
          nerdStuffWrap.style.maxHeight = '0px';
        });
      }
    }

    function guardClick(el, handler, cooldown = 600){
      if(!el || typeof handler !== 'function') return;
      if(el.__guardedHandler){
        el.removeEventListener('click', el.__guardedHandler);
      }
      let busy = false;
      const wrapped = async (e) => {
        if(busy){
          e.preventDefault();
          e.stopPropagation();
          return;
        }
        busy = true;
        try{
          await handler(e);
        }finally{
          setTimeout(() => { busy = false; }, cooldown);
        }
      };
      el.__guardedHandler = wrapped;
      el.addEventListener('click', wrapped);
    }

    async function loadSettings(){
      try{
        const res = await fetch('/settings');
        if(!res.ok) return;
        const data = await res.json();
        settingsState = { ...settingsState, ...data };
        defaultOutputPath = data.output_root || defaultOutputPath;
        applySettingsUI();
      }catch(err){
        console.warn('failed to load settings', err);
      }
    }

    async function persistSettings(patch, {showMissingPopup = true} = {}){
      settingsState = { ...settingsState, ...patch };
      try{
        const res = await fetch('/settings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(settingsState),
        });
        if(!res.ok){
          if(showMissingPopup) showPopup("folder doesn't exist");
          await loadSettings();
          return;
        }
        const data = await res.json();
        settingsState = { ...settingsState, ...data };
        defaultOutputPath = defaultOutputPath || data.output_root;
        applySettingsUI();
      }catch(err){
        console.warn('settings update failed', err);
        if(showMissingPopup) showPopup("folder doesn't exist");
        await loadSettings();
      }
    }

    async function checkStorage(){
      if(!navigator.storage || !navigator.storage.estimate) return true;
      try{
        const {usage = 0, quota = 0} = await navigator.storage.estimate();
        const free = Math.max(0, quota - usage);
        const freeGb = free / (1024 ** 3);
        if(freeGb < STORAGE_BLOCK_GB){
          storageBlocked = true;
          showPopup('storage critically low (<0.5 GB). uploads are blocked');
          updateStartButton();
          return false;
        }
        if(freeGb < STORAGE_WARN_GB){
          const now = Date.now();
          if(now - lastStorageWarning > 10000){
            showPopup('storage low (<1 GB remaining)');
            lastStorageWarning = now;
          }
        }
        storageBlocked = false;
        updateStartButton();
      }catch(_){}
      return !storageBlocked;
    }

    function checkMemory(){
      const perf = performance || window.performance;
      const mem = perf && perf.memory;
      if(!mem) return true;
      const { jsHeapSizeLimit = 0, usedJSHeapSize = 0 } = mem;
      const limit = jsHeapSizeLimit ? jsHeapSizeLimit * MEMORY_LIMIT_RATIO : MEMORY_LIMIT_MB * 1024 * 1024;
      if(usedJSHeapSize > limit){
        memoryBlocked = true;
        const now = Date.now();
        if(now - lastMemoryWarning > 10000){
          showPopup('memory use is high; uploads paused to prevent leaks');
          lastMemoryWarning = now;
        }
        updateStartButton();
        return false;
      }
      memoryBlocked = false;
      updateStartButton();
      return true;
    }

    function estimateDecodeMb(seconds){
      // Roughly 0.34 MB/sec for 44.1kHz stereo float
      return seconds * 0.34;
    }

    function hasMemoryForDuration(seconds){
      if(seconds <= LONG_TRACK_SEC) return true;
      const perf = performance || window.performance;
      const mem = perf && perf.memory;
      if(!mem || !mem.jsHeapSizeLimit) return true;
      const { jsHeapSizeLimit = 0, usedJSHeapSize = 0 } = mem;
      const freeMb = Math.max(0, jsHeapSizeLimit - usedJSHeapSize) / (1024 * 1024);
      const needMb = estimateDecodeMb(seconds) * 1.5; // headroom
      if(freeMb <= needMb){
        showPopup('song is too long for available memory right now');
        return false;
      }
      return true;
    }

    function getAudioDuration(file){
      return new Promise((resolve) => {
        let url = null;
        try{
          const audio = document.createElement('audio');
          audio.preload = 'metadata';
          url = URL.createObjectURL(file);
          const cleanup = () => {
            if(url){ URL.revokeObjectURL(url); url = null; }
            audio.removeAttribute('src');
            audio.load();
          };
          const timeout = setTimeout(() => { cleanup(); resolve(-1); }, 3000);
          audio.onloadedmetadata = () => {
            clearTimeout(timeout);
            const d = audio.duration;
            cleanup();
            resolve(isFinite(d) ? d : -1);
          };
          audio.onerror = () => { clearTimeout(timeout); cleanup(); resolve(-1); };
          audio.src = url;
        }catch(_){
          if(url){ URL.revokeObjectURL(url); }
          resolve(-1);
        }
      });
    }

    // settings overlay refs (assigned on load)
    let settingsOverlay = null;
    function openSettings(){
      if(!settingsOverlay) settingsOverlay = document.getElementById('settings-overlay');
      const bg = document.getElementById('overlay-bg');
      const card = document.getElementById('settings-card');
      if(settingsOverlay){
        settingsOverlay.classList.remove('hidden');
        if(bg){
          bg.classList.remove('anim-out');
          bg.classList.remove('anim');
          void bg.offsetWidth;
          bg.classList.add('anim'); // IN
        }
        if(card){
          card.classList.remove('settings-card-out');
          card.classList.remove('opacity-0');
          void card.offsetWidth;
          card.classList.add('settings-card-in'); // IN
        }
        if(nerdStuffWrap){
          setNerdStuffExpanded(nerdStuffExpanded, { immediate: true });
        }
      }
    }
    function closeSettings(){
      if(!settingsOverlay) settingsOverlay = document.getElementById('settings-overlay');
      const bg = document.getElementById('overlay-bg');
      const card = document.getElementById('settings-card');
      if(settingsOverlay){
        if(bg){
          bg.classList.remove('anim');
          bg.classList.remove('anim-out');
          void bg.offsetWidth;
          bg.classList.add('anim-out'); // OUT
        }
        if(card){
          card.classList.remove('settings-card-in');
          card.classList.remove('fade-in');
          card.classList.add('settings-card-out'); // OUT
        }
        setTimeout(() => {
          if(card){
            card.classList.remove('settings-card-out');
            card.classList.add('opacity-0');
          }
          if(bg){ bg.classList.remove('anim-out'); }
          settingsOverlay.classList.add('hidden');
          if(modelPreviewActive){
            restoreModelPreview();
          }
        }, 180);
      }
    }

    // --- Progress Smoother Helper ---
    function makeProgressSmoother(bar){
      let raf = null;
      let value = 0;     // currently displayed percent
      let target = 0;    // latest requested percent
      const clamp = p => Math.max(0, Math.min(100, p));
      const tick = () => {
        // critically damped-ish exponential approach toward target
        const delta = target - value;
        // if close enough, snap to target and stop
        if (Math.abs(delta) < 0.08) {
          value = target;
          bar.style.width = value + '%';
          raf = null;
          return;
        }
        // ease toward target; 0.12 controls lag/smoothness
        value += delta * 0.12;
        bar.style.width = value + '%';
        raf = requestAnimationFrame(tick);
      };
      return {
        setImmediate(p){ value = target = clamp(p); bar.style.width = value + '%'; },
        setTarget(p){ target = clamp(p); if(!raf) raf = requestAnimationFrame(tick); },
        stop(){ if(raf){ cancelAnimationFrame(raf); raf = null; } }
      };
    }

    if(localStorage.getItem('playIntro')){
      localStorage.removeItem('playIntro');
      title.style.position = 'absolute';
      title.style.left = '50%';
      title.style.top = '45%';
      title.style.transform = 'translate(-50%, -50%)';
      title.style.opacity = '1';
      setTimeout(() => {
        title.style.transition = 'all 0.5s ease';
        title.style.left = '';
        title.style.top = '';
        title.style.transform = '';
      }, 50);
      setTimeout(() => {
        document.querySelectorAll('#dropzone, .glass.w-64, #queue, #clear-btn').forEach((el,i)=>{
          setTimeout(()=>{el.classList.add('fade-in')}, i*25);
        });
      }, 600);
    } else {
      title.classList.add('fade-in');
    }

    let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
    // Helper: is a task finished? (completed or stopped)
    function isFinished(t){
      return t && (t.pct >= 100 || t.stage === 'stopped');
    }
    function saveTasks(){ localStorage.setItem('tasks', JSON.stringify(tasks)); }

    function truncateFilename(name, max = 25){
      const text = String(name || '');
      if(text.length <= max) return text;
      const dotIndex = text.lastIndexOf('.');
      if(dotIndex > 0 && dotIndex < text.length - 1){
        const ext = text.slice(dotIndex);
        const reserve = max - ext.length - 1;
        if(reserve > 6){
          return `${text.slice(0, reserve)}…${ext}`;
        }
      }
      return `${text.slice(0, Math.max(1, max - 1))}…`;
    }

    function applyFilename(el, name){
      if(!el) return;
      const full = String(name || '');
      el.textContent = truncateFilename(full, 25);
      el.title = full;
    }

    function artworkUrl(taskId){
      return taskId ? `/api/tasks/${encodeURIComponent(taskId)}/artwork` : '';
    }

    function shouldDimArtwork(task){
      if(!task) return false;
      const stage = String(task.stage || '').toLowerCase();
      if(stage === 'ready' || stage === 'done' || stage === 'stopped' || stage === 'error') return false;
      if(stage === 'queued') return true;
      return typeof task.pct === 'number' ? (task.pct >= 0 && task.pct < 100) : false;
    }

    function applyArtwork(row, task){
      if(!row) return;
      const shell = row.querySelector('.artwork-shell');
      const img = row.querySelector('.artwork-img');
      if(!shell || !img) return;
      if(row.__artworkRetryTimer){
        clearTimeout(row.__artworkRetryTimer);
        row.__artworkRetryTimer = null;
      }
      shell.classList.toggle('is-dim', shouldDimArtwork(task));
      const taskId = task && task.id ? String(task.id) : '';
      if(!taskId){
        img.hidden = true;
        img.removeAttribute('src');
        img.dataset.taskId = '';
        shell.classList.remove('has-image');
        return;
      }
      if(img.dataset.taskId === taskId && img.getAttribute('src') && !img.hidden){
        return;
      }
      img.dataset.taskId = taskId;
      img.hidden = true;
      img.onload = () => {
        if(img.dataset.taskId !== taskId) return;
        if(row.__artworkRetryTimer){
          clearTimeout(row.__artworkRetryTimer);
          row.__artworkRetryTimer = null;
        }
        img.hidden = false;
        shell.classList.add('has-image');
      };
      img.onerror = () => {
        if(img.dataset.taskId !== taskId) return;
        img.hidden = true;
        img.removeAttribute('src');
        shell.classList.remove('has-image');
        row.__artworkRetryTimer = setTimeout(() => {
          if(img.dataset.taskId !== taskId) return;
          img.src = `${artworkUrl(taskId)}?v=${encodeURIComponent(taskId)}&r=${Date.now()}`;
        }, 900);
      };
      img.src = `${artworkUrl(taskId)}?v=${encodeURIComponent(taskId)}`;
    }

    function applyRowState(row, task){
      if(!row || !task) return;
      applyArtwork(row, task);
      const labels = row.querySelector('.labels');
      if(labels){
        const normalized = String(task.stage || '').toLowerCase();
        const visible = !(normalized === 'ready' && Number(task.pct || 0) === 0 && !task.frozen);
        labels.classList.toggle('hidden', !visible);
      }
    }

    function formatEta(seconds){
      const value = Number(seconds);
      if(!Number.isFinite(value) || value <= 0) return '';
      const rounded = Math.max(1, Math.round(value));
      if(rounded < 60){
        return `${rounded}s`;
      }
      if(rounded < 3600){
        const minutes = Math.floor(rounded / 60);
        const remainSeconds = Math.round(rounded % 60);
        if(minutes < 5 && remainSeconds){
          return `${minutes}m ${remainSeconds}s`;
        }
        return `${minutes}m`;
      }
      const minutes = Math.round(rounded / 60);
      const hours = Math.floor(minutes / 60);
      const remain = minutes % 60;
      return remain ? `${hours}h ${remain}m` : `${hours}h`;
    }

    function formatProgressChip(pct, etaSeconds){
      const clamped = Math.round(Math.max(0, Math.min(100, Number(pct) || 0)));
      const eta = formatEta(etaSeconds);
      if(!eta && (queueStarted || startPressed)){
        return `${clamped}% • ${clamped >= 92 ? 'finishing up' : 'estimating'}`;
      }
      return eta ? `${clamped}% • ${eta}` : `${clamped}%`;
    }

    function shouldUseProgressSummary(stage){
      const normalized = String(stage || '').toLowerCase();
      if(['done', 'error', 'errored', 'stopped'].includes(normalized)) return false;
      return !['ready', 'queued'].includes(normalized);
    }

    async function rehydrateTasks(){
      if(!Array.isArray(tasks) || tasks.length === 0) return;
      try{
        const res = await fetch('/rehydrate_tasks', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ tasks })
        });
        if(!res.ok) return;
        const data = await res.json();
        if(!data || !Array.isArray(data.tasks)) return;
        const keep = new Set();
        data.tasks.forEach(t => {
          if(!t || !t.id) return;
          const idx = tasks.findIndex(x => x && x.id === t.id);
          const merged = idx >= 0 ? { ...tasks[idx], ...t } : t;
          if(idx >= 0) tasks[idx] = merged;
          else tasks.push(merged);
          keep.add(t.id);
        });
        // drop any tasks that were not completed on disk (e.g., force-quit)
        tasks = tasks.filter(t => t && keep.has(t.id));
        saveTasks();
      }catch(err){
        console.debug('rehydration skipped', err);
      }
    }
    // processing-state helper
    function isProcessing(t){
      if(!t) return false;
      const stage = (t.stage || '').toLowerCase();
      const inactive = ['ready','queued','done','stopped','error'];
      if(inactive.includes(stage)) return false;
      return typeof t.pct === 'number' ? (t.pct >= 0 && t.pct < 100) : true;
    }
    
    function updateClear(){
      let hasClearable = false;
      if (!startPressed) {
        hasClearable = Array.isArray(tasks) && tasks.length > 0;
      } else {
        hasClearable = tasks && tasks.some(t => t && (t.stage === 'stopped' || (typeof t.pct === 'number' && t.pct >= 100)));
      }
      const itemCount = queue.children.length;
      const manyItems = itemCount > 6;
      const compact = itemCount <= 2;
      spacer.style.height = hasClearable ? (compact ? '14px' : '22px') : '0px';
      if (bottomPad) {
        if(itemCount === 0){
          bottomPad.style.height = '0px';
        }else if(compact){
          bottomPad.style.height = '10px';
        }else{
          bottomPad.style.height = manyItems ? '34px' : '22px';
        }
      }
      if (hasClearable) {
        clearBtn.classList.add('show');
        clearBtn.style.pointerEvents = 'auto';
      } else {
        clearBtn.classList.remove('show');
        clearBtn.style.pointerEvents = 'none';

    function updateVigs(){

    function enforceCapacity(){
      const activeCount = tasks.filter(t => t && !isFinished(t)).length;
      const full = activeCount >= MAX_TASKS;
      dropzone.classList.toggle('pointer-events-none', full);
      dropzone.classList.toggle('opacity-60', full);
      if(fileInput) fileInput.disabled = full;
      if(full){

        if(!enforceCapacity._lastNotice || now - enforceCapacity._lastNotice > 8000){
          showPopup('maximum number of songs reached! Please clear all to upload more songs');
          enforceCapacity._lastNotice = now;
        }
      }
      return full;
    }

// --- Helper to rerun a task server-side ---
    async function rerunTask(task, ui, options = {}){
      const {bar, st, dl, stopPad, smooth} = ui;
      if(!task || !task.id) return;
      let ok = false, newId = null, payload = null;
      const body = {};
      if(typeof options.stems === 'string' && options.stems){
        body.stems = options.stems;
      }
      if(typeof options.output_format === 'string' && options.output_format){
        body.output_format = options.output_format;
      }
      if(typeof options.video_handling === 'string' && options.video_handling){
        body.video_handling = options.video_handling;
      }
      try {
        const res = await fetch('/rerun/' + task.id, {
          method: 'POST',
          headers: Object.keys(body).length ? { 'Content-Type': 'application/json' } : undefined,
          body: Object.keys(body).length ? JSON.stringify(body) : undefined,
        });
        if (res.ok) {
          try { payload = await res.json(); } catch(_) { payload = null; }
          newId = payload && (payload.task_id || payload.id || null);
          if (newId) { ok = true; }
        }
      } catch (_) {}
      if (!ok || !newId) {
        // Treat it as a stopped/error card with rerun available
        if (st) { showStatus(st); st.textContent = 'error'; st.classList.remove('hidden'); setStatusVisibility(st, 'error'); }
        const parent = st && st.closest ? st.closest('.card') : null;
        if (parent) parent.classList.add('done');

        if (stopPad) {
          stopPad.title = 'rerun';
          stopPad.innerHTML = '';          // prevent double icon
          setRetryIcon(stopPad);
          stopPad.style.pointerEvents = '';
          stopPad.style.opacity = '';
          guardClick(stopPad, (e) => { e.preventDefault(); rerunTask(task, ui); });
        }
        updateUI();
        showError('rerun failed');
        return;
      }
      // reset visual state
      if(st){ showStatus(st); st.classList.remove('hidden'); st.textContent = 'preparing (0%)'; setStatusVisibility(st, 'preparing'); }
      if(dl){ dl.classList.remove('show'); dl.removeAttribute('href'); }
      const card = stopPad && stopPad.closest('.card');
      if(card){ card.classList.remove('done'); }
      if(smooth){ smooth.setImmediate(0); }
      // show stop square again
      if(stopPad){
        stopPad.title = 'stop';
        stopPad.innerHTML = '';
        setStopSquareIcon(stopPad);
        stopPad.style.pointerEvents = '';
        stopPad.style.opacity = '';
        guardClick(stopPad, async (e) => {
          if(stopPad.dataset.busy === '1') return;
          stopPad.dataset.busy = '1';
          e.preventDefault();
          await requestStop(task.id, task, { bar, st, dl, stopPad, smooth });
          setTimeout(() => { stopPad.dataset.busy = ''; }, 250);
        });
        setStopVisibility(stopPad, 'preparing');
      }
      task.stage = 'preparing';
      task.pct = 0;
      if(Array.isArray(payload && payload.stems)){
        task.stems = payload.stems;
      }
      task.downloaded = false;
      task.autoDownloaded = false;
      task.out_dir = null;
      saveTasks();
      updateUI();
      // resume tracking
      const oldId = task.id;
      task.id = newId;
      if (dl) { dl.removeAttribute('href'); }
      const row = stopPad && stopPad.closest('.item-row');
      if (row) { row.__taskId = newId; }
      saveTasks();
      trackProgress(newId, bar, st, dl, null, null, task, null, smooth, stopPad);
    }

    function createItem(task){
      const node = template.content.cloneNode(true);
      const li   = node.querySelector('.filename');
      const bar  = node.querySelector('.bar-fill');
      const st   = node.querySelector('.chip.status');
      const dl   = node.querySelector('.dl-pad');
      const card = node.querySelector('.card');
      const stopPad = node.querySelector('.stop-pad');
      applyFilename(li, task.name);
      const labels = node.querySelector('.labels');
      const smooth = makeProgressSmoother(bar);
      const initOverall = Math.max(0, Math.min(100, task.pct || 0));
      smooth.setImmediate(initOverall);
      if(task.stage === 'done'){
        hideStatus(st);
        dl.classList.add('show');
        dl.title = 'open folder';
        bindFolderButton(dl, task);
        card.classList.add('done');
        if(stopPad) stopPad.remove();
      }
      else if(task.stage === 'stopped'){
        // Treat as finished visually
        showStatus(st);
        st.classList.add('hidden');
        card.classList.add('done');
        if (stopPad){
          stopPad.style.display = '';
          stopPad.classList.add('show');
          stopPad.innerHTML = '';
          setRetryIcon(stopPad);
          stopPad.title = 'rerun';
        guardClick(stopPad, (e) => { e.preventDefault(); rerunTask(task, { bar, st, dl, stopPad, smooth }); });
      }
      }
      else if (task.stage === 'error' || task.pct < 0) {
        // Treat like stopped; keep label visible for context
        showStatus(st);
        st.textContent = 'error';
        const parent = st.closest('.card'); if (parent) parent.classList.add('done');
        if (stopPad){
          stopPad.style.display = '';
          stopPad.classList.add('show');
          stopPad.title = 'rerun';
          stopPad.innerHTML = '';
          setRetryIcon(stopPad);
        guardClick(stopPad, (e) => { e.preventDefault(); rerunTask(task, { bar, st, dl, stopPad, smooth }); });
      }
      }
      else {
        const sp = Math.round(Math.max(0, Math.min(100, task.pct)));
        showStatus(st);
        const normalizedStage = String(task.stage || '').toLowerCase();
        if(!shouldUseProgressSummary(normalizedStage)){
          st.textContent = displayStage(task.stage) || 'queued';
          smooth.setImmediate(0);
        }else{
          st.textContent = formatProgressChip(sp, task.eta_seconds);
          if(normalizedStage === 'ready' || normalizedStage === 'queued'){
            smooth.setImmediate(0);
          }else{
            smooth.setImmediate(sp);
          }
        }
        setStopVisibility(stopPad, task.stage);
        if(stopPad && task.id && isProcessing(task)){
          setStopSquareIcon(stopPad);
          stopPad.style.pointerEvents = '';
          stopPad.style.opacity = '';
          stopPad.title = 'stop';
          guardClick(stopPad, async (e) => {
            if(stopPad.dataset.busy === '1') return;
            stopPad.dataset.busy = '1';
            e.preventDefault();
            await requestStop(task.id, task, { bar, st, dl, stopPad, smooth });
            stopPad.dataset.busy = '';
          });
        }
      }
      if(dl && (task.stage === 'stopped' || task.stage === 'error' || task.pct < 0)){
        dl.classList.add('show');
        dl.title = 'retry';
        dl.innerHTML = '';
        setRetryIcon(dl);
        guardClick(dl, (e) => { e.preventDefault(); rerunTask(task, { bar, st, dl, stopPad, smooth }); });
      }
      setStatusVisibility(st, task.stage);
      const inserted = node.children[0];
      inserted.classList.add('enter-pre');
      // Attach task id for later filtering
      inserted.__taskId = task.id;
      queue.insertBefore(inserted, queue.firstChild);
      // apply enter transition to the inserted card
      requestAnimationFrame(() => {
        inserted.classList.add('enter-active');
      });
      // Apply any stem labels if present
      applyLabels(inserted.querySelector('.labels'), task.stems);
      applyRowState(inserted, task);
      ensureTaskProgressTracking(task);
      updateUI();
      return {bar, st, dl, stopPad, smooth};
    }

      requestAnimationFrame(() => {
        mask.classList.add('show');

      });

    function wait(ms){
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function nextFrame(){
      return new Promise((resolve) => requestAnimationFrame(() => resolve()));
    }

    function closeActiveStreams(){
      activeStreams.forEach((stream) => {
        try{ stream.close(); } catch(_){}
      });
      activeStreams.clear();
    }

    function abortPendingUploads(){
      pendingItems.forEach((pending) => {
        if(pending && pending.xhr){
          try{ pending.xhr.abort(); } catch(_){}
        }
      });
    }

    async function clearAllTasks({ showToast = false } = {}){
      if(isClearing) return;
      isClearing = true;
      closeActiveStreams();
      abortPendingUploads();
      if(Array.isArray(tasks)){
        tasks.forEach(t => {
          if(t && t.id){
            try { fetch('/stop/' + t.id, {method:'POST'}); } catch(_){}
          }
        });
      }
      if(appShell){
        appShell.classList.remove('resetting-in');
        appShell.classList.add('resetting-out');
        await wait(180);
      }
      for (const el of Array.from(queue.children)) { el.remove(); }
      tasks = [];
      pendingItems.length = 0;
      startLock = false;
      startPressed = false;
      queueStarted = false;
      saveTasks();
      updateUI();
      if(appShell){
        appShell.classList.remove('resetting-out');
        appShell.classList.add('resetting-in');
        await nextFrame();
        await nextFrame();
        appShell.classList.remove('resetting-in');
      }
      try { await fetch('/clear_all_uploads', {method:'POST'}); } catch(_){ }
      isClearing = false;
      if(showToast) showPopup('all tasks cleared');
    }

    guardClick(clearBtn, async () => {
      const hasRunning = Array.isArray(tasks) && tasks.some(t => isProcessing(t));
      if(hasRunning){
        const ok = await showConfirm('a process is still running. clear all anyway?');
        if(!ok) return;

      await clearAllTasks();

    rehydrateTasks().finally(() => {

    async function copyText(text){
      try{
        if(navigator.clipboard && navigator.clipboard.writeText){
          await navigator.clipboard.writeText(text);

        }
      }catch(_){}
      try{
        const input = document.createElement('textarea');
        input.value = text;
        input.setAttribute('readonly', '');
        input.style.position = 'absolute';
        input.style.left = '-9999px';
        document.body.appendChild(input);
        input.select();
        const ok = document.execCommand('copy');
        input.remove();
        return ok;
      }catch(_){
        return false;
      }
    }

    function parseReleaseHighlights(notes){
      const text = String(notes || '').trim();
      if(!text) return [];
      const lines = text
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean)
        .filter((line) => !/^summary:/i.test(line))
        .filter((line) => !/^highlights:/i.test(line));
      const bulletLines = lines
        .filter((line) => /^[-*•]/.test(line))
        .map((line) => line.replace(/^[-*•]\s*/, '').trim())
        .filter(Boolean);
      if(bulletLines.length){
        return bulletLines.slice(0, 5);
      }
      const plain = lines
        .map((line) => line.replace(/^[-*•]\s*/, '').trim())
        .filter(Boolean)
        .join(' ');
      if(!plain) return [];
      return plain
        .split(/\s*[;,]\s*/)
        .map((part) => part.trim())
        .filter(Boolean)
        .slice(0, 5);
    }

        let next = null;
        try{
          if(window.pywebview && window.pywebview.api && window.pywebview.api.acknowledge_port_conflict){
            next = await window.pywebview.api.acknowledge_port_conflict();
          }
        }catch(err){

        }
        if(!next){
          const baseRuntime = settingsState.runtime || {};
          const lanBase = String(baseRuntime.lan_display || '').split(':')[0];
          const lanLocalBase = String(baseRuntime.lan_local_display || '').split(':')[0];
          next = {
            ...baseRuntime,
            preferred_port: preferredPort,
            current_port: currentPort,
            port_conflict: false,

            lan_display: lanBase ? `${lanBase}:${currentPort}` : (status.lan_display || ''),

    function formatBytes(bytes){
      const value = Number(bytes || 0);
      if(!value || value < 1024) return '0 b';
      const units = ['kb', 'mb', 'gb', 'tb'];
      let size = value / 1024;
      let unit = units[0];
      for(let i = 1; i < units.length && size >= 1024; i += 1){
        size /= 1024;
        unit = units[i];
      }
      return `${size.toFixed(size >= 100 ? 0 : 1)} ${unit}`;
    }

    function formatDuration(seconds){
      const value = Number(seconds);
      if(!Number.isFinite(value) || value < 0) return '';
      if(value < 60) return `${Math.round(value)}s left`;
      const mins = Math.floor(value / 60);
      const secs = Math.round(value % 60);
      if(mins < 60) return `${mins}m ${secs}s left`;
      const hours = Math.floor(mins / 60);
      const remMins = mins % 60;
      return `${hours}h ${remMins}m left`;
    }

    function simulateModelPreviewDownload(){
      clearModelPreviewTimer();
      modelPreviewActive = true;
      openSettings();
      setNerdStuffExpanded(true);
      const totalBytes = 2.1 * 1024 * 1024 * 1024;
      let pct = 0;
      const tick = () => {
        pct = Math.min(100, pct + 8);
        updateModelSettings({
          status: pct >= 100 ? 'done' : 'downloading',
          pct,
          current_model: pct < 34 ? 'vocals' : (pct < 68 ? 'instrumental' : 'both (highest quality)'),
          downloaded_bytes: Math.round(totalBytes * (pct / 100)),
          total_bytes: Math.round(totalBytes),
          eta_seconds: pct >= 100 ? 0 : Math.max(0, Math.round((100 - pct) * 0.55)),
          error: '',
          missing: pct >= 100 ? [] : ['vocals', 'instrumental', 'deux'],
        });
        if(pct >= 100){
          modelPreviewTimer = setTimeout(() => {
            modelPreviewTimer = null;
            restoreModelPreview({ immediate: true });
          }, 900);
          return;
        }
        modelPreviewTimer = setTimeout(tick, 170);
      };
      tick();
    }

    function updateModelSettings(status){
      lastModelStatus = status;
      const missing = Array.isArray(status && status.missing) ? status.missing : [];
      const isDownloading = !!(status && status.status === 'downloading');
      const isError = !!(status && status.status === 'error');
      modelsBlocked = missing.length > 0 || isDownloading;
      renderModelChecklist(status);
      if(modelsNote){
        let noteMessage = '';
        if(isError){
          noteMessage = status.error || 'model download failed';
        }else if(isDownloading){
          noteMessage = `downloading ${status.current_model || 'models'}`;
        }else if(missing.length){
          noteMessage = `${missing.length} model${missing.length === 1 ? '' : 's'} missing`;
        }
        modelsNote.textContent = noteMessage;
        modelsNote.hidden = !noteMessage;
      }
      if(modelsProgressWrap){
        modelsProgressWrap.hidden = !isDownloading && !isError;
      }
      if(modelsProgressBar){
        modelsProgressBar.style.width = `${Math.max(0, status && status.pct ? status.pct : 0)}%`;
      }
      if(modelsProgressMeta){
        if(isDownloading){
          const bits = [
            `${Math.max(0, status.pct || 0)}%`,
            `${formatBytes(status.downloaded_bytes)} / ${formatBytes(status.total_bytes)}`,
          ];
          const eta = formatDuration(status.eta_seconds);
          if(eta) bits.push(eta);
          modelsProgressMeta.textContent = bits.join(' · ');
        }else if(isError){
          modelsProgressMeta.textContent = status.error || 'download failed';
        }else{
          modelsProgressMeta.textContent = '';
        }
      }
      if(modelsDownloadBtn){
        const showDownloadButton = missing.length > 0 && !isDownloading;
        modelsDownloadBtn.hidden = !showDownloadButton;
        modelsDownloadBtn.disabled = false;
        modelsDownloadBtn.classList.toggle('attention-sequence', showDownloadButton);
        modelsDownloadBtn.textContent = isError ? 'retry download' : 'download models';
      }
      if(modelsFolderBtn){
        modelsFolderBtn.hidden = missing.length === 0 && !isError;
      }
      if(modelsCtaWrap){
        const allChildrenHidden = Array.from(modelsCtaWrap.children).every((child) => child.hidden);
        modelsCtaWrap.hidden = allChildrenHidden;
      }
      if((isDownloading || missing.length > 0) && nerdStuffWrap){
        setNerdStuffExpanded(true);

    /* === upload & progress logic === */
    // queue of files added by user but not yet uploaded
    const pendingItems = [];
    const activeStreams = new Map();
    let isClearing = false;
    function closeTaskStream(taskId){
      if(!taskId) return;
      const stream = activeStreams.get(taskId);
      if(stream){
        try{ stream.close(); }catch(_){ }
        activeStreams.delete(taskId);
      }
    }

    function markTaskStopped(taskRef, ui){
      if(!taskRef || !ui) return;
      const {st, dl, stopPad, smooth, bar} = ui;
      taskRef.stage = 'stopped';
      taskRef.pct = 0;
      saveTasks();
      if(smooth){ smooth.setImmediate(0); }
      if(st){ showStatus(st); st.textContent = 'stopped'; st.classList.remove('hidden'); }
      const parent = st && st.closest ? st.closest('.card') : null;
      if(parent){ parent.classList.add('done'); }
      if(dl){ dl.classList.remove('show'); }
      if(stopPad){
        stopPad.style.pointerEvents = '';
        stopPad.style.opacity = '';
        stopPad.title = 'rerun';
        setRetryIcon(stopPad);
        guardClick(stopPad, (ev) => { ev.preventDefault(); rerunTask(taskRef, { bar, st, dl, stopPad, smooth }); });
      }
      if(ui.item){
        applyRowState(ui.item, taskRef);
      }
      updateUI();
    }

    async function requestStop(taskId, taskRef, ui){
      if(!taskId || !taskRef || !ui) return;
      closeTaskStream(taskId);
      markTaskStopped(taskRef, ui);
      try{ await fetch('/stop/' + taskId, { method:'POST' }); }catch(_){ }
    }
    function normalizeStemList(stems){
      return Array.isArray(stems) ? stems.map((item) => String(item || '').toLowerCase()).filter(Boolean) : [];
    }
    function stemsMatch(a, b){
      const left = normalizeStemList(a);
      const right = normalizeStemList(b);
      if(left.length !== right.length) return false;
      return left.every((item, index) => item === right[index]);
    }
    function findRowForTask(task){
      if(!task) return null;
      return Array.from(queue.children).find((row) => {
        if(task.id && row.__taskId === task.id) return true;
        if(task.tempKey && row.__tempKey === task.tempKey) return true;
        return false;
      }) || null;
    }
    function taskUiForRow(row){
      if(!row) return null;
      const item = row;
      const bar = row.querySelector('.bar-fill');
      const st = row.querySelector('.chip.status');
      const dl = row.querySelector('.dl-pad');
      const card = row.querySelector('.card');
      const stopPad = row.querySelector('.stop-pad');
      const smooth = makeProgressSmoother(bar);
      return { item, bar, st, dl, card, stopPad, smooth };
    }
    function ensureTaskProgressTracking(task){
      if(!task || !task.id) return;
      const stage = String(task.stage || '').toLowerCase();
      if(['ready', 'done', 'error', 'stopped'].includes(stage)) return;
      if(activeStreams.has(task.id)) return;
      const row = findRowForTask(task);
      const ui = taskUiForRow(row);
      if(!ui) return;
      trackProgress(task.id, ui.bar, ui.st, ui.dl, null, null, task, null, ui.smooth, ui.stopPad);
    }
    async function restartTaskWithSelection(task, stems){
      if(!task || !task.id) return false;
      const row = findRowForTask(task);
      const ui = taskUiForRow(row);
      if(!ui) return false;
      await rerunTask(task, ui, {
        stems: stems.join(','),
        output_format: settingsState.output_format || 'same_as_input',
        video_handling: settingsState.video_handling || 'audio_only',
      });
      return true;
    }
    function dropPendingById(id){
      if(!id) return;
      const idx = pendingItems.findIndex(p => p && p.id === id);
      if(idx >= 0) pendingItems.splice(idx,1);
    }
    function dropPendingByTempKey(tempKey){
      if(!tempKey) return;
      const idx = pendingItems.findIndex(p => p && p.tempKey === tempKey);
      if(idx >= 0) pendingItems.splice(idx,1);
    }
    function getTaskById(id){
      return tasks.find(t => t && t.id === id);
    }

    function getTaskByTempKey(tempKey){
      if(!tempKey) return null;
      return tasks.find(t => t && t.tempKey === tempKey);
    }

    function failPendingUpload(pending, message){
      if(!pending) return;
      dropPendingByTempKey(pending.tempKey);
      const taskIndex = tasks.findIndex((task) => task && task.tempKey === pending.tempKey && !task.id);
      if(taskIndex >= 0){
        tasks.splice(taskIndex, 1);
      }
      if(pending.ui && pending.ui.smooth && typeof pending.ui.smooth.stop === 'function'){
        pending.ui.smooth.stop();
      }
      const row = pending.ui && pending.ui.item;
      if(row && row.parentElement){
        row.classList.add('leave', 'leave-active');
        requestAnimationFrame(() => row.classList.add('leave-to'));
        setTimeout(() => {
          if(row.parentElement){
            row.remove();
          }
          saveTasks();
          updateUI();
        }, 180);
      }else{
        saveTasks();
        updateUI();
      }
      if(message && !isClearing){
        showPopup(message);
      }
    }

    function revealStatusesAfterStart(){
      queueStarted = true;
      document.querySelectorAll('#queue .chip').forEach(chip => chip.classList.remove('hidden'));
      refreshAllLabelVisibility();
      document.querySelectorAll('#queue .stop-pad').forEach(pad => {
        const row = pad.closest('.item-row');
        const id = row ? row.__taskId : null;
        const tempKey = row ? row.__tempKey : null;
        const task = id ? getTaskById(id) : getTaskByTempKey(tempKey);
        const stage = task ? task.stage : null;
        setStopVisibility(pad, stage);
      });
