<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <meta charset="utf-8" />
  <title>stemsplat</title>

  <!-- nunito sans -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- tailwind (cdn build) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --bg-1: #0F2027;   /* emerald dusk left */
      --bg-2: #2C5364;   /* emerald dusk right */
      --txt-main: #E7ECEF;
      --txt-dim: #B8C4CC;
      --accent:  #8ED8FF; /* subtle cyan accent for highlights only */
      --icon:   #9BB6C2;
      --card: rgba(23, 35, 41, 0.55);
      --card-done: rgba(40, 66, 77, 0.70);
      --border: rgba(255,255,255,0.06);
    }
    /* Animated light blur for settings overlay BACKGROUND (not the card) */
    @keyframes overlayBlurIn {
      from { backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px); background-color: rgba(0, 0, 0, 0.0); }
      to   { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); background-color: rgba(0, 0, 0, 0.46); }
    }
    .overlay-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      backdrop-filter: blur(0px);
      -webkit-backdrop-filter: blur(0px);
      background-color: rgba(0, 0, 0, 0.0);
    }
    .overlay-bg.anim     { animation: overlayBlurIn .28s ease both; }
    @keyframes overlayBlurOut {
      from { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); background-color: rgba(0, 0, 0, 0.46); }
      to   { backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px); background-color: rgba(0, 0, 0, 0.0); }
    }
    .overlay-bg.anim-out { animation: overlayBlurOut 0.18s ease both; }
    body.desktop-shell .overlay-root {
      top: 46px;
      padding-top: 0;
      padding-bottom: 12px;
    }
    body.desktop-shell .overlay-root .overlay-bg {
      top: 46px;
    }
    body.desktop-shell .overlay-root .overlay-card {
      max-height: calc(100vh - 70px);
    }
    @keyframes settingsCardIn {
      from { opacity: 0; transform: translateY(8px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0)    scale(1.00); }
    }
    @keyframes settingsCardOut {
      from { opacity: 1; transform: translateY(0)    scale(1.00); }
      to   { opacity: 0; transform: translateY(6px)  scale(0.98); }
    }
    .settings-card-in  { animation: settingsCardIn  .28s cubic-bezier(.2,.7,.2,1) both; }
    .settings-card-out { animation: settingsCardOut .18s ease both; }

    html, body { min-height: 100%; height: 100%; }
    html {
      background: linear-gradient(135deg, #0B1A1F 0%, var(--bg-1) 35%, var(--bg-2) 100%);
      scrollbar-width: none;
      -ms-overflow-style: none;
      overflow: hidden;
      overscroll-behavior: none;
    }
    body {
      padding: 0;
      overscroll-behavior: none;
      background: transparent;
      overflow: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    html::-webkit-scrollbar,
    body::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }
    body.desktop-shell .window-chrome { display: flex; }
    .bg-gradient-shell {
      position: fixed;
      left: 0;
      right: 0;
      top: -22vh;
      bottom: -22vh;
      pointer-events: none;
      z-index: -3;
      background: linear-gradient(135deg, #0B1A1F 0%, var(--bg-1) 35%, var(--bg-2) 100%);
      transform: scale(1);
      transition: top .32s ease, bottom .32s ease, left .32s ease, right .32s ease, transform .32s ease, opacity .32s ease;
    }
    .window-chrome {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 46px;
      padding: 8px 12px 0;
      z-index: 72;
      align-items: flex-start;
      pointer-events: none;
      transition: opacity .28s ease;
    }
    .window-dragbar {
      width: 100%;
      height: 28px;
      display: flex;
      align-items: center;
      pointer-events: auto;
    }
    .window-controls-shell {
      position: relative;
      display: flex;
      align-items: center;
      min-width: 56px;
      height: 18px;
      padding: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }
    .window-controls {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .window-control {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 0;
      padding: 0;
      cursor: pointer;
      position: relative;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.12);
    }
    .window-control:hover::after {
      content: attr(data-glyph);
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 11px;
      line-height: 1;
      color: rgba(0,0,0,.62);
      font-weight: 800;
    }
    .window-control.close { background: #ff5f57; }
    .window-control.minimize { background: #febc2e; }
    .window-control.fullscreen { background: #28c840; }

    .noise::before { content: ""; position: fixed; inset: -22vh 0; pointer-events: none;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/></filter><rect width="120" height="120" filter="url(%23n)" opacity="0.035"/></svg>') repeat; opacity:.18; transition: inset .32s ease, opacity .32s ease, transform .32s ease; transform: scale(1); }
    .shade { position: fixed; inset: -22vh 0; pointer-events: none; background: rgba(0,0,0,0.24); z-index: -1; transition: inset .32s ease, opacity .32s ease, transform .32s ease; transform: scale(1); }
    .app-shell {
      position: relative;
      min-height: 100vh;
      max-height: 100vh;
      width: 100%;
      padding: clamp(72px, 9vh, 108px) 0 clamp(72px, 9vh, 108px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior-y: none;
      -webkit-overflow-scrolling: touch;
      transition: transform .28s cubic-bezier(.22,.61,.36,1), opacity .28s cubic-bezier(.22,.61,.36,1), padding .28s ease;
      will-change: transform, opacity;
    }
    .app-shell::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }
    .app-shell.compact {
      justify-content: flex-start;
      padding-top: clamp(96px, 12vh, 136px);
      padding-bottom: clamp(108px, 14vh, 152px);
    }
    .app-shell.empty {
      justify-content: center;
      padding-top: clamp(112px, 14vh, 164px);
      padding-bottom: clamp(8px, 2vh, 18px);
      overflow-y: hidden;
    }
    .app-shell.expanded {
      justify-content: flex-start;
    }
    .app-shell.resetting-out {
      opacity: 0;
      transform: translateY(-18px);
    }
    .app-shell.resetting-in {
      opacity: 0;
      transform: translateY(18px);
    }
    body.desktop-shell.app-launch-pre .window-chrome,
    body.desktop-shell.app-launch-pre #app-shell,
    body.desktop-shell.app-launch-pre .bg-gradient-shell,
    body.desktop-shell.app-launch-pre .noise::before,
    body.desktop-shell.app-launch-pre .shade {
      opacity: 0;
    }
    body.fullscreen-transition .window-chrome,
    body.fullscreen-transition #app-shell,
    body.fullscreen-transition #settings-overlay,
    body.fullscreen-transition #toast-wrap {
      opacity: 0;
      transition: opacity .18s ease;
    }
    body.fullscreen-transition .bg-gradient-shell {
      top: -34vh;
      bottom: -34vh;
      left: -8vw;
      right: -8vw;
      transform: scale(1.04);
    }
    body.fullscreen-transition .noise::before,
    body.fullscreen-transition .shade {
      inset: -34vh -8vw;
      transform: scale(1.04);
    }
    body.clear-all-anim #app-shell,
    body.clear-all-anim .window-chrome,
    body.clear-all-anim .bottom-left-controls,
    body.clear-all-anim #top-vig,
    body.clear-all-anim #bot-vig {
      transition: transform .46s cubic-bezier(.22,.61,.36,1), opacity .46s ease, filter .46s ease;
      will-change: transform, opacity, filter;
      pointer-events: none;
    }
    body.clear-all-anim .bg-gradient-shell,
    body.clear-all-anim .noise::before,
    body.clear-all-anim .shade {
      transition: transform .58s cubic-bezier(.2,.74,.2,1), opacity .58s ease, inset .58s ease;
      will-change: transform, opacity, inset;
    }
    body.clear-all-exit #app-shell,
    body.clear-all-exit .window-chrome,
    body.clear-all-exit .bottom-left-controls,
    body.clear-all-exit #top-vig,
    body.clear-all-exit #bot-vig {
      opacity: 0;
      transform: translateY(-20px) scale(.965);
      filter: blur(10px) saturate(.96);
    }
    body.clear-all-exit .bg-gradient-shell {
      top: -30vh;
      bottom: -30vh;
      left: -6vw;
      right: -6vw;
      transform: scale(1.08) rotate(-.35deg);
    }
    body.clear-all-exit .noise::before,
    body.clear-all-exit .shade {
      inset: -30vh -6vw;
      transform: scale(1.06);
      opacity: .12;
    }
    body.clear-all-enter-start #app-shell,
    body.clear-all-enter-start .window-chrome,
    body.clear-all-enter-start .bottom-left-controls,
    body.clear-all-enter-start #top-vig,
    body.clear-all-enter-start #bot-vig {
      opacity: 0;
      transform: translateY(16px) scale(1.028);
      filter: blur(8px) saturate(.98);
    }
    body.clear-all-enter-start .bg-gradient-shell {
      top: -26vh;
      bottom: -26vh;
      left: -4vw;
      right: -4vw;
      transform: scale(1.06);
    }
    body.clear-all-enter-start .noise::before,
    body.clear-all-enter-start .shade {
      inset: -26vh -4vw;
      transform: scale(1.04);
      opacity: .2;
    }

    .glass { background: var(--card); backdrop-filter: blur(12px) saturate(110%); -webkit-backdrop-filter: blur(12px) saturate(110%); border: 1px solid var(--border); box-shadow: 0 8px 26px rgba(0,0,0,.28); }
    .glass-light { background: rgba(255,255,255,0.12); backdrop-filter: blur(10px) saturate(110%); -webkit-backdrop-filter: blur(10px) saturate(110%); border: 1px solid rgba(255,255,255,0.18); box-shadow: 0 8px 26px rgba(0,0,0,.28); }
    .card   { position: relative; overflow: visible; transition: background .20s ease; will-change: transform, opacity; transform: translateZ(0); contain: paint; flex-shrink: 0; }
    .card:hover { box-shadow: 0 8px 26px rgba(0,0,0,.28); }
    .card:has(.dl-pad:hover):hover { box-shadow: 0 12px 40px rgba(0,0,0,.35); }
    .card.done { background: var(--card-done); }
    .item-row .card,
    .queue-group-parent-row .card {
      background:
        radial-gradient(circle at top right, rgba(142,216,255,.10), rgba(142,216,255,0) 42%),
        linear-gradient(180deg, rgba(21, 36, 43, 0.86), rgba(14, 26, 33, 0.94));
      border: 1px solid rgba(214, 236, 245, 0.10);
      box-shadow:
        0 16px 34px rgba(0,0,0,.24),
        inset 0 1px 0 rgba(255,255,255,.06),
        inset 0 0 0 1px rgba(255,255,255,.02);
    }
    .item-row .card:hover,
    .queue-group-parent-row .card:hover {
      box-shadow:
        0 20px 42px rgba(0,0,0,.28),
        inset 0 1px 0 rgba(255,255,255,.08),
        inset 0 0 0 1px rgba(255,255,255,.025);
    }
    .item-row .card.done,
    .queue-group-parent-row .card.done {
      background:
        radial-gradient(circle at top right, rgba(142,216,255,.12), rgba(142,216,255,0) 44%),
        linear-gradient(180deg, rgba(30, 52, 61, 0.90), rgba(20, 37, 45, 0.96));
      border-color: rgba(214, 236, 245, 0.14);
    }
    .card-body { display:flex; align-items:center; gap:14px; min-width:0; }
    .card-copy { flex:1; min-width:0; display:flex; flex-direction:column; gap:12px; }
    .filename-wrap { min-width:0; }
    .artwork-shell {
      position: relative;
      flex: 0 0 60px;
      width: 60px;
      height: 60px;
      border-radius: 14px;
      overflow: hidden;
      background: linear-gradient(145deg, rgba(255,255,255,.14), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
      transition: filter .2s ease, transform .2s ease, opacity .2s ease;
    }
    .artwork-img,
    .artwork-fallback {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .artwork-img {
      object-fit: cover;
      display: block;
      transition: opacity .2s ease, filter .2s ease;
    }
    .artwork-fallback {
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: 24px;
      color: rgba(255,255,255,.84);
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.18), rgba(255,255,255,0) 55%),
        linear-gradient(145deg, rgba(19,40,49,.95), rgba(9,23,30,.95));
      transition: opacity .2s ease, filter .2s ease;
    }
    .artwork-loading {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(8, 15, 18, 0.32);
      transition: opacity .18s ease;
      pointer-events: none;
    }
    .artwork-loading[hidden] {
      opacity: 0;
    }
    .artwork-spinner {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,.22);
      border-top-color: rgba(255,255,255,.92);
      animation: artworkSpin .9s linear infinite;
    }
    @keyframes artworkSpin {
      to { transform: rotate(360deg); }
    }
    .artwork-shell.has-image .artwork-fallback { opacity: 0; }
    .artwork-shell.is-dim .artwork-img,
    .artwork-shell.is-dim .artwork-fallback { filter: brightness(.48) saturate(.78); }
    .status-wrap { flex: 0 0 auto; display:flex; align-items:center; }

    #title { letter-spacing: 0.5px; text-shadow: 0 8px 40px rgba(0,0,0,.45); }

    .fade-in { animation: fade .7s ease forwards; }
    @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .btn { display:inline-flex; align-items:center; justify-content:center; border-radius:12px; padding:6px 10px; font-size:12px; font-weight:600; transition: transform .15s ease, box-shadow .15s ease; }
    .btn:focus { outline: 2px solid rgba(255,255,255,.25); outline-offset: 2px; }
    .btn:hover { transform: translateY(-1px); }
    .btn[hidden] { display:none !important; }
    .btn[disabled] { opacity:.55; cursor:default; transform:none !important; }
    #start-btn:disabled {
      pointer-events: none;
      cursor: default;
      opacity: .42;
      filter: grayscale(.2);
    }

    @keyframes modelAttention {
      0%, 18%, 100% { transform: translateX(0); box-shadow: 0 0 0 0 rgba(255,255,255,0); }
      4% { transform: translateX(-1px); }
      8% { transform: translateX(2px); }
      12% { transform: translateX(-1.5px); }
      16% { transform: translateX(1px); }
      28% { box-shadow: 0 0 0 0 rgba(255,255,255,.2); }
      50% { box-shadow: 0 0 0 12px rgba(255,255,255,0); }
      62% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
    }
    .attention-sequence { animation: modelAttention 2.5s ease-in-out infinite; }
    .attention-ring { box-shadow: 0 0 0 2px rgba(255,255,255,.45), 0 0 24px rgba(255,255,255,.18); }
    #toast-wrap {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 95;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
      pointer-events: none;
    }
    #toast-wrap > * { pointer-events: auto; }
    @keyframes toastCardIn {
      from { opacity: 0; transform: translateY(-8px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes toastCardOut {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to { opacity: 0; transform: translateY(-6px) scale(0.98); }
    }
    .toast-card {
      width: min(360px, calc(100vw - 32px));
      padding: 12px 14px;
      border-radius: 16px;
      color: var(--txt-main);
      border: 1px solid rgba(255,255,255,.12);
      background:
        radial-gradient(circle at top right, rgba(142,216,255,.14), rgba(142,216,255,0) 44%),
        linear-gradient(145deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      box-shadow: 0 14px 34px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.09);
      transform-origin: top right;
      animation: toastCardIn .24s cubic-bezier(.2,.7,.2,1) both;
    }
    .toast-card.toast-card-closing {
      pointer-events: none;
      animation: toastCardOut .18s ease both;
    }
    .toast-title {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.35;
    }
    .toast-body {
      margin-top: 4px;
      font-size: 12px;
      line-height: 1.45;
      opacity: .76;
    }
    .toast-progress {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
    }
    .dimmed-control { opacity:.45; pointer-events:none; }
    .copy-button { width: 28px; height: 28px; border-radius: 999px; border: 1px solid rgba(255,255,255,.14); background: rgba(255,255,255,.10); display: inline-flex; align-items: center; justify-content: center; color: var(--txt-main); transition: transform .15s ease, background .15s ease, box-shadow .15s ease; }
    .copy-button:hover { transform: translateY(-1px); background: rgba(255,255,255,.16); box-shadow: 0 8px 18px rgba(0,0,0,.2); }
    #settings-card {
      width: min(94vw, 1120px);
      max-height: min(84vh, 900px);
      overflow: visible;
      padding-right: 18px;
      background: transparent !important;
      border: 0 !important;
      box-shadow: none !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
    }
    .settings-card-scroll {
      max-height: calc(min(84vh, 900px) - 24px);
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding-right: 10px;
    }
    .settings-card-scroll::-webkit-scrollbar { display: none; }
    .settings-scroll-indicator {
      position: absolute;
      top: 52px;
      right: 10px;
      bottom: 20px;
      width: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      overflow: hidden;
      pointer-events: none;
      opacity: 0;
      transition: opacity .16s ease;
    }
    .settings-scroll-indicator.visible { opacity: 1; }
    .settings-scroll-thumb {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      border-radius: 999px;
      background: rgba(255,255,255,.72);
      transform: translateY(0);
      transition: transform .1s ease-out, height .14s ease-out, opacity .12s ease;
    }
    .copy-button svg { position:absolute; inset:0; margin:auto; width:16px; height:16px; transition: opacity .18s ease; }
    .copy-button .icon-wrap { position:relative; width:16px; height:16px; display:block; }
    .copy-button .icon-check { opacity:0; }
    .copy-button[data-copied="1"] .icon-copy { opacity:0; }
    .copy-button[data-copied="1"] .icon-check { opacity:1; }
    .settings-row { display:flex; align-items:center; gap:10px; }
    .model-list { display:flex; flex-direction:column; gap:10px; }
    .model-item {
      display:flex;
      align-items:center;
      gap:10px;
      font-size:13px;
      color: var(--txt-main);
      padding: 10px 12px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
    }
    .model-item-main { min-width: 0; display:flex; align-items:center; gap:10px; flex:1 1 auto; }
    .model-item-copy { min-width: 0; display: flex; flex-direction: column; gap: 3px; flex:1 1 auto; }
    .model-item-label { line-height: 1.15; }
    .model-item-size { font-size: 11px; color: rgba(223,236,244,.58); }
    .model-item-actions { display:flex; align-items:center; gap:8px; flex:0 0 auto; }
    .model-action-btn {
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.05);
      color: rgba(245,251,255,.86);
      transition: transform .16s ease, background .16s ease, border-color .16s ease;
    }
    .model-action-btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,.11);
      border-color: rgba(255,255,255,.22);
    }
    .model-action-btn svg { width:15px; height:15px; }
    .model-state { width:18px; height:18px; border-radius:999px; border:1px solid rgba(255,255,255,.18); background: rgba(255,255,255,.06); display:flex; align-items:center; justify-content:center; color:#b9f4d7; }
    .model-state svg { width:12px; height:12px; opacity:0; transition: opacity .18s ease; }
    .model-item.ready .model-state svg { opacity:1; }
    .passcode-indicator {
      appearance: none;
      padding: 0;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.08);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: rgba(236,248,255,.82);
      flex: 0 0 auto;
      cursor: default;
      transition: background .18s ease, border-color .18s ease, opacity .18s ease, box-shadow .18s ease, color .18s ease, transform .18s ease;
      opacity: .5;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }
    .passcode-indicator svg {
      width: 16px;
      height: 16px;
      opacity: .34;
      transition: opacity .18s ease, transform .18s ease;
    }
    .passcode-indicator.pending {

    function currentSelectedModeKey(){
      if(selectedPresetMode){
        return selectedPresetMode;
      }
      if(selectedStemModes.has('vocals') && selectedStemModes.has('instrumental')){
        return 'both_separate';
      }
      return Array.from(selectedStemModes)[0] || 'vocals';
    }

    function setSelectionForModeKey(modeKey){
      if(!modeKey) return;
      if(MODE_TO_TAB[modeKey] === 'presets'){
        selectedPresetMode = modeKey;
        selectedStemModes = new Set();
        return;
      }
      selectedPresetMode = null;
      if(modeKey === 'both_separate'){
        selectedStemModes = new Set(['vocals', 'instrumental']);
        lastStemSelectionAnchor = 'instrumental';
      }else{
        selectedStemModes = new Set([modeKey]);
        lastStemSelectionAnchor = modeKey;
      }
    }

    function visibleStemModeIdsForTab(tabKey = activeModeTab){
      return (MODE_TAB_OPTIONS[tabKey] || [])
        .filter((option) => option.kind === 'stem')
        .map((option) => option.id);
    }

    function stemSelectionAnchorForTab(tabKey = activeModeTab){
      const visibleModeIds = visibleStemModeIdsForTab(tabKey);
      if(visibleModeIds.includes(lastStemSelectionAnchor)){
        return lastStemSelectionAnchor;
      }
      return visibleModeIds.find((modeId) => selectedStemModes.has(modeId)) || visibleModeIds[0] || null;
    }

    function selectStemModeRange(modeKey){
      if(!modeKey) return;
      const visibleModeIds = visibleStemModeIdsForTab();
      const targetIndex = visibleModeIds.indexOf(modeKey);
      if(targetIndex === -1){
        setSelectionForModeKey(modeKey);
        return;
      }
      const anchorMode = stemSelectionAnchorForTab();
      const anchorIndex = anchorMode ? visibleModeIds.indexOf(anchorMode) : -1;
      if(anchorIndex === -1){
        setSelectionForModeKey(modeKey);
        return;
      }
      const start = Math.min(anchorIndex, targetIndex);
      const end = Math.max(anchorIndex, targetIndex);
      selectedPresetMode = null;
      selectedStemModes = new Set(visibleModeIds.slice(start, end + 1));
      lastStemSelectionAnchor = modeKey;
    }

    function ensureSelectionForActiveTab(){
      if(selectedPresetMode && MODE_TO_TAB[selectedPresetMode] === activeModeTab){
        return;
      }
      if(Array.from(selectedStemModes).some((mode) => MODE_TO_TAB[mode] === activeModeTab)){
        return;
      }
      if(selectedPresetMode || selectedStemModes.size){
        return;
      }
      const currentMode = currentSelectedModeKey();
      if(currentMode && MODE_TO_TAB[currentMode] === activeModeTab){
        return;
      }
      const firstOption = (MODE_TAB_OPTIONS[activeModeTab] || [])[0];
      if(firstOption){
        setSelectionForModeKey(firstOption.id);
      }
    }

    function toggleStemModeSelection(modeKey, additive = false){
      if(!modeKey) return;
      selectedPresetMode = null;
      const next = new Set(selectedStemModes);
      if(next.has(modeKey)){
        next.delete(modeKey);
      }else{
        if(!additive){
          setSelectionForModeKey(modeKey);
          return;
        }
        next.add(modeKey);
      }
      selectedStemModes = next;
      lastStemSelectionAnchor = modeKey;
    }

    function renderModeChoices(animate = false){
      if(!modeChoices) return;
      let startHeight = 0;
      if(modesCard){
        modesCard.classList.toggle('modes-card-shifting', animate);
        if(animate){
          clearModesCardHeightAnimation();
          startHeight = modesCard.getBoundingClientRect().height;
          modesCard.classList.remove('modes-card-height-animating');
          modesCard.style.height = `${startHeight}px`;
          void modesCard.offsetHeight;
        }else{
          finishModesCardHeightAnimation();

      modeChoices.innerHTML = '';
      (MODE_TAB_OPTIONS[activeModeTab] || []).forEach((option, index) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `${option.kind === 'preset' ? 'preset-choice' : 'stem-choice'} mode-choice-enter`;
        button.style.setProperty('--mode-item-index', String(index));
        button.dataset.tooltip = option.tooltip || option.label;
        if(option.kind === 'preset'){
          button.dataset.preset = option.id;
          button.innerHTML = `<span class="preset-choice-title">${option.label}</span>`;
        }else{
          button.dataset.mode = option.id;
          button.textContent = option.label;

        bindDelayedTooltip(button);
        modeChoices.appendChild(button);

      if(animate && modesCard){

          modesCardHeightTransitionHandler = (event) => {
            if(event.target !== modesCard || event.propertyName !== 'height') return;
            finishModesCardHeightAnimation();

          modesCard.addEventListener('transitionend', modesCardHeightTransitionHandler);
          modesCard.style.height = `${endHeight}px`;

        modesCardHeightTimer = window.setTimeout(() => {
          finishModesCardHeightAnimation();
        }, 520);
      }else if(modesCard){
        finishModesCardHeightAnimation();
      }
    }

    function formatGainDb(value){
      const numeric = Number(value || 0);
      const sign = numeric > 0 ? '+' : '';
      return `${sign}${numeric.toFixed(1)} dB`;
    }

    function formatStorageSettingValue(value, fallback){
      const numeric = Number.isFinite(Number(value)) ? Number(value) : Number(fallback);
      return numeric.toFixed(1).replace(/\.0$/, '');
    }

    function coerceStorageSettingValue(value, fallback, minimum){
      const parsed = Number.parseFloat(String(value ?? '').trim());
      if(!Number.isFinite(parsed)) return Number(fallback);
      const clamped = Math.max(minimum, Math.min(1024, parsed));
      return Math.round(clamped * 10) / 10;
    }

    function formatStorageUsage(bytes){
      const numeric = Number(bytes || 0);
      return `${(numeric / (1024 ** 3)).toFixed(1).replace(/\.0$/, '')} GB`;
    }

    function formatDownloadRate(bytesPerSecond){
      const numeric = Number(bytesPerSecond || 0);
      if(!(numeric > 0)) return '';
      return `${(numeric / (1024 * 1024)).toFixed(1)} mb/s`;
    }

      if(tooltipEl) return tooltipEl;

      tooltipEl.hidden = true;

      return tooltipEl;
    }

    function hideTooltip(){

    function positionTooltip(target){
      if(!tooltipEl || !target) return;
      const rect = target.getBoundingClientRect();
      const pad = 12;
      const top = Math.max(pad, rect.top - tooltipEl.offsetHeight - 10);
      let left = rect.left + (rect.width / 2) - (tooltipEl.offsetWidth / 2);
      left = Math.max(pad, Math.min(left, window.innerWidth - tooltipEl.offsetWidth - pad));
      tooltipEl.style.left = `${Math.round(left)}px`;
      tooltipEl.style.top = `${Math.round(top)}px`;
    }

    function showTooltip(target){
      const message = target && target.dataset ? String(target.dataset.tooltip || '').trim() : '';
      if(!message) return;
      const el = ensureTooltip();
      el.textContent = message;
      el.hidden = false;
      positionTooltip(target);
      requestAnimationFrame(() => {
        positionTooltip(target);
        el.classList.add('visible');
      });
    }

    function bindDelayedTooltip(target){
      if(!target || target.dataset.tooltipBound === '1') return;
      target.dataset.tooltipBound = '1';
      const begin = () => {
        const message = String(target.dataset.tooltip || '').trim();
        if(!message) return;
        if(tooltipTimer){
          clearTimeout(tooltipTimer);
        }
        tooltipTarget = target;
        tooltipTimer = setTimeout(() => {
          tooltipTimer = null;
          if(tooltipTarget === target){
            showTooltip(target);
          }
        }, 500);
      };
      target.addEventListener('mouseenter', begin);
      target.addEventListener('mouseleave', hideTooltip);
      target.addEventListener('blur', hideTooltip);
      target.addEventListener('mousedown', hideTooltip);
    }

    function guardClick(el, handler, cooldown = 600){
      if(!el || typeof handler !== 'function') return;
      if(el.__guardedHandler){
        el.removeEventListener('click', el.__guardedHandler);
      }
      let busy = false;
      const wrapped = async (e) => {
        if(busy){
          e.preventDefault();
          e.stopPropagation();
          return;
        }
        busy = true;
        try{
          await handler(e);
        }finally{
          setTimeout(() => { busy = false; }, cooldown);
        }
      };
      el.__guardedHandler = wrapped;
      el.addEventListener('click', wrapped);
    }

    async function checkStorage(){
      if(!navigator.storage || !navigator.storage.estimate) return true;
      try{
        const {usage = 0, quota = 0} = await navigator.storage.estimate();
        const free = Math.max(0, quota - usage);
        const freeGb = free / (1024 ** 3);
        if(freeGb < STORAGE_BLOCK_GB){
          storageBlocked = true;
          showPopup('storage critically low (<0.5 GB). uploads are blocked');
          updateStartButton();
          return false;
        }
        if(freeGb < STORAGE_WARN_GB){
          const now = Date.now();
          if(now - lastStorageWarning > 10000){
            showPopup('storage low (<1 GB remaining)');
            lastStorageWarning = now;
          }
        }
        storageBlocked = false;
        updateStartButton();
      }catch(_){}
      return !storageBlocked;
    }

    function checkMemory(){
      const perf = performance || window.performance;
      const mem = perf && perf.memory;
      if(!mem) return true;
      const { jsHeapSizeLimit = 0, usedJSHeapSize = 0 } = mem;
      const limit = jsHeapSizeLimit ? jsHeapSizeLimit * MEMORY_LIMIT_RATIO : MEMORY_LIMIT_MB * 1024 * 1024;
      if(usedJSHeapSize > limit){
        memoryBlocked = true;
        const now = Date.now();
        if(now - lastMemoryWarning > 10000){
          showPopup('memory use is high; uploads paused to prevent leaks');
          lastMemoryWarning = now;
        }
        updateStartButton();
        return false;
      }
      memoryBlocked = false;
      updateStartButton();
      return true;
    }

    function estimateDecodeMb(seconds){
      // Roughly 0.34 MB/sec for 44.1kHz stereo float
      return seconds * 0.34;
    }

    function hasMemoryForDuration(seconds){
      if(seconds <= LONG_TRACK_SEC) return true;
      const perf = performance || window.performance;
      const mem = perf && perf.memory;
      if(!mem || !mem.jsHeapSizeLimit) return true;
      const { jsHeapSizeLimit = 0, usedJSHeapSize = 0 } = mem;
      const freeMb = Math.max(0, jsHeapSizeLimit - usedJSHeapSize) / (1024 * 1024);
      const needMb = estimateDecodeMb(seconds) * 1.5; // headroom
      if(freeMb <= needMb){
        showPopup('song is too long for available memory right now');
        return false;
      }
      return true;
    }

    function getAudioDuration(file){
      return new Promise((resolve) => {
        let url = null;
        try{
          const audio = document.createElement('audio');
          audio.preload = 'metadata';
          url = URL.createObjectURL(file);
          const cleanup = () => {
            if(url){ URL.revokeObjectURL(url); url = null; }
            audio.removeAttribute('src');
            audio.load();
          };
          const timeout = setTimeout(() => { cleanup(); resolve(-1); }, 3000);
          audio.onloadedmetadata = () => {
            clearTimeout(timeout);
            const d = audio.duration;
            cleanup();
            resolve(isFinite(d) ? d : -1);
          };
          audio.onerror = () => { clearTimeout(timeout); cleanup(); resolve(-1); };
          audio.src = url;
        }catch(_){
          if(url){ URL.revokeObjectURL(url); }
          resolve(-1);
        }
      });
    }

    function updateScrollIndicator(scrollBody, indicator, thumb){
      if(!scrollBody || !indicator || !thumb) return;
      const clientHeight = scrollBody.clientHeight || 0;
      const scrollHeight = scrollBody.scrollHeight || 0;
      const maxScroll = Math.max(0, scrollHeight - clientHeight);
      const visible = maxScroll > 4;
      indicator.classList.toggle('visible', visible);
      if(!visible){
        thumb.style.height = '0px';
        thumb.style.transform = 'translateY(0)';
        return;
      }
      const trackHeight = indicator.clientHeight || Math.max(0, clientHeight - 40);
      const thumbHeight = Math.max(40, Math.round((clientHeight / scrollHeight) * trackHeight));
      const thumbTravel = Math.max(0, trackHeight - thumbHeight);
      const thumbOffset = maxScroll > 0 ? (scrollBody.scrollTop / maxScroll) * thumbTravel : 0;
      thumb.style.height = `${thumbHeight}px`;
      thumb.style.transform = `translateY(${thumbOffset}px)`;
    }

    function wantsSoftPanelScroll(){
      if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches){
        return false;
      }
      return !window.matchMedia || window.matchMedia('(pointer:fine)').matches;
    }

    function attachSoftWheelScroll(scrollBody, updateIndicator = null){
      if(!scrollBody || !wantsSoftPanelScroll()){
        return () => {};
      }
      let raf = null;
      let target = scrollBody.scrollTop || 0;
      const syncTarget = () => {
        if(!raf){
          target = scrollBody.scrollTop || 0;
        }
        if(updateIndicator){
          updateIndicator();
        }
      };
      const step = () => {
        const maxScroll = Math.max(0, (scrollBody.scrollHeight || 0) - (scrollBody.clientHeight || 0));
        target = Math.max(0, Math.min(maxScroll, target));
        const current = scrollBody.scrollTop || 0;
        const delta = target - current;
        if(Math.abs(delta) < 0.5){
          scrollBody.scrollTop = target;
          if(updateIndicator){
            updateIndicator();
          }
          raf = null;
          return;
        }
        scrollBody.scrollTop = current + (delta * 0.16);
        if(updateIndicator){
          updateIndicator();
        }
        raf = requestAnimationFrame(step);
      };
      const onWheel = (event) => {
        if(event.ctrlKey || Math.abs(event.deltaY) <= Math.abs(event.deltaX || 0)){
          return;
        }
        const maxScroll = Math.max(0, (scrollBody.scrollHeight || 0) - (scrollBody.clientHeight || 0));
        if(maxScroll <= 0){
          return;
        }
        event.preventDefault();
        target = Math.max(0, Math.min(maxScroll, target + event.deltaY));
        if(!raf){
          raf = requestAnimationFrame(step);
        }
      };
      scrollBody.addEventListener('scroll', syncTarget, { passive: true });
      scrollBody.addEventListener('wheel', onWheel, { passive: false });
      return () => {
        if(raf){
          cancelAnimationFrame(raf);
          raf = null;
        }
        scrollBody.removeEventListener('scroll', syncTarget);
        scrollBody.removeEventListener('wheel', onWheel);
      };
    }

    // --- Progress Smoother Helper ---
    function makeProgressSmoother(bar){
      let raf = null;
      let value = 0;     // currently displayed percent
      let target = 0;    // latest requested percent
      const clamp = p => Math.max(0, Math.min(100, p));
      const tick = () => {
        // critically damped-ish exponential approach toward target
        const delta = target - value;
        // if close enough, snap to target and stop
        if (Math.abs(delta) < 0.08) {
          value = target;
          bar.style.width = value + '%';
          raf = null;
          return;
        }
        // ease toward target; 0.12 controls lag/smoothness
        value += delta * 0.12;
        bar.style.width = value + '%';
        raf = requestAnimationFrame(tick);
      };
      return {
        setImmediate(p){ value = target = clamp(p); bar.style.width = value + '%'; },
        setTarget(p){ target = clamp(p); if(!raf) raf = requestAnimationFrame(tick); },
        stop(){ if(raf){ cancelAnimationFrame(raf); raf = null; } }
      };
    }

    function songDisplayTitle(name){
      let text = String(name || '').trim();
      if(!text) return 'untitled';
      text = text.replace(/\.[^.]+$/u, '').trim();
      text = text.replace(/^\s*\d{1,3}\s*[-._)\]]+\s*/u, '');
      text = text.replace(/^\s*\d{1,3}\s+/u, '');
      text = text.replace(/\s*[\[(](?:from|feat\.?|ft\.?|official|lyrics?|audio|video)[^)\]]*[\])]\s*$/iu, '');
      text = text.replace(/\s+/g, ' ').trim();
      return text || String(name || '').replace(/\.[^.]+$/u, '').trim() || 'untitled';
    }

    function megaCardTitle(tasksList, limit = 35){
      const seen = new Set();
      const names = [];
      (Array.isArray(tasksList) ? tasksList : []).forEach((task) => {
        const title = songDisplayTitle(task && task.name);
        if(!title || seen.has(title)) return;
        seen.add(title);
        names.push(title);
      });
      if(!names.length) return 'songs';
      let result = '';
      for(const title of names){
        const candidate = result ? `${result}, ${title}` : title;
        if(candidate.length > limit){
          break;
        }
        result = candidate;
      }
      if(!result){
        result = names[0].slice(0, limit).trim();
      }
      if(result.length < names.join(', ').length){
        result = `${result}${result.endsWith('…') ? '' : '…'}`;
      }
      return result;
    }

    function truncateFilename(name, max = 25){
      const text = String(name || '');
      if(text.length <= max) return text;
      const dotIndex = text.lastIndexOf('.');
      if(dotIndex > 0 && dotIndex < text.length - 1){
        const ext = text.slice(dotIndex);
        const reserve = max - ext.length - 1;
        if(reserve > 6){
          return `${text.slice(0, reserve)}…${ext}`;
        }
      }
      return `${text.slice(0, Math.max(1, max - 1))}…`;
    }

    function applyFilename(el, name){
      if(!el) return;
      const full = String(name || '');
      el.textContent = truncateFilename(full, 25);
      el.title = full;

    function setArtworkLoading(row, isLoading){
      if(!row) return;
      const shell = row.querySelector('.artwork-shell');
      const loading = row.querySelector('.artwork-loading');

    function shouldDimArtwork(task){
      if(!task) return false;
      const stage = String(task.stage || '').toLowerCase();
      if(stage === 'ready' || stage === 'done' || stage === 'stopped' || stage === 'error') return false;
      if(stage === 'queued') return true;
      return typeof task.pct === 'number' ? (task.pct >= 0 && task.pct < 100) : false;
    }

    function applyArtwork(row, task){
      if(!row) return;
      const shell = row.querySelector('.artwork-shell');
      const img = row.querySelector('.artwork-img');
      if(!shell || !img) return;
      if(row.__artworkRetryTimer){
        clearTimeout(row.__artworkRetryTimer);
        row.__artworkRetryTimer = null;
      }
      shell.classList.toggle('is-dim', shouldDimArtwork(task));
      const taskId = task && task.id ? String(task.id) : '';
      if(!taskId){
        row.__artworkResolved = false;
        row.__artworkAttempts = 0;
        setArtworkLoading(row, true);
        img.hidden = true;
        img.removeAttribute('src');
        img.dataset.taskId = '';
        shell.classList.remove('has-image');
        return;
      }
      if(img.dataset.taskId === taskId && img.getAttribute('src') && !img.hidden){
        setArtworkLoading(row, false);
        return;
      }
      if(img.dataset.taskId !== taskId){
        row.__artworkResolved = false;
        row.__artworkAttempts = 0;
      }
      img.dataset.taskId = taskId;
      setArtworkLoading(row, !row.__artworkResolved);
      img.hidden = true;
      img.onload = () => {
        if(img.dataset.taskId !== taskId) return;
        if(row.__artworkRetryTimer){
          clearTimeout(row.__artworkRetryTimer);
          row.__artworkRetryTimer = null;
        }
        row.__artworkResolved = true;
        row.__artworkAttempts = 0;
        img.hidden = false;
        shell.classList.add('has-image');
        setArtworkLoading(row, false);
      };
      img.onerror = () => {
        if(img.dataset.taskId !== taskId) return;
        row.__artworkAttempts = Number(row.__artworkAttempts || 0) + 1;
        img.hidden = true;
        img.removeAttribute('src');
        shell.classList.remove('has-image');
        if(row.__artworkAttempts >= 6){
          row.__artworkResolved = true;
          setArtworkLoading(row, false);
          return;
        }
        setArtworkLoading(row, true);
        row.__artworkRetryTimer = setTimeout(() => {
          if(img.dataset.taskId !== taskId) return;
          img.src = `${artworkUrl(taskId)}?v=${encodeURIComponent(taskId)}&r=${Date.now()}`;
        }, 900);
      };
      img.src = `${artworkUrl(taskId)}?v=${encodeURIComponent(taskId)}`;
    }

    function taskPendingEntry(task){
      if(!task) return null;
      if(task.tempKey){
        return pendingItems.find((pending) => pending && pending.tempKey === task.tempKey) || null;
      }
      if(task.id){
        return pendingItems.find((pending) => pending && pending.id === task.id) || null;
      }
      return null;
    }

    function taskClipState(task){
      const startMs = Math.max(0, Number(task && task.clip_start_ms) || 0);
      const endRaw = Number(task && task.clip_end_ms);
      return {
        startMs,
        endMs: Number.isFinite(endRaw) && endRaw > 0 ? endRaw : null,
        enabled: !!(task && task.clip_enabled),
      };
    }

    function cloneClipState(clip){
      const source = clip && typeof clip === 'object' ? clip : {};
      return {
        startMs: Math.max(0, Math.round(Number(source.startMs) || 0)),
        endMs: Number.isFinite(Number(source.endMs)) && Number(source.endMs) > 0 ? Math.round(Number(source.endMs)) : null,
        enabled: !!source.enabled,
      };
    }

    function applyClipState(task, clip){
      if(!task || !clip) return;
      task.clip_start_ms = Math.max(0, Math.round(Number(clip.startMs) || 0));
      task.clip_end_ms = Number.isFinite(Number(clip.endMs)) && Number(clip.endMs) > 0
        ? Math.round(Number(clip.endMs))
        : null;
      task.clip_enabled = !!clip.enabled;
    }

    function taskGroupMembers(task){
      if(!task) return [];
      if(task.tempKey){
        const grouped = tasks.filter((candidate) => candidate && candidate.tempKey === task.tempKey);
        if(grouped.length) return grouped;
      }
      return [task];
    }

    function syncPendingClipState(task, clip){
      const pending = taskPendingEntry(task);
      if(!pending) return;
      pending.clip_start_ms = Math.max(0, Math.round(Number(clip.startMs) || 0));
      pending.clip_end_ms = Number.isFinite(Number(clip.endMs)) && Number(clip.endMs) > 0
        ? Math.round(Number(clip.endMs))
        : null;
      pending.clip_enabled = !!clip.enabled;
    }

    function syncPendingClipStateToGroup(task, clip){
      if(task && task.tempKey){
        pendingItems.forEach((pending) => {
          if(!pending || pending.tempKey !== task.tempKey) return;
          syncPendingClipState({ tempKey: pending.tempKey, id: pending.id }, clip);
          pending.clip_start_ms = Math.max(0, Math.round(Number(clip.startMs) || 0));
          pending.clip_end_ms = Number.isFinite(Number(clip.endMs)) && Number(clip.endMs) > 0 ? Math.round(Number(clip.endMs)) : null;
          pending.clip_enabled = !!clip.enabled;
        });
        return;
      }
      syncPendingClipState(task, clip);
    }

    function editorTimeLabel(ms){
      const safe = Math.max(0, Math.round(Number(ms) || 0));
      const totalSeconds = Math.floor(safe / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      const millis = Math.floor((safe % 1000) / 10);
      return `${minutes}:${String(seconds).padStart(2, '0')}.${String(millis).padStart(2, '0')}`;
    }

    function editorRulerLabel(ms){
      const safe = Math.max(0, Math.round(Number(ms) || 0));
      const totalSeconds = Math.floor(safe / 1000);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      if(hours > 0){
        return `${hours}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
      }
      return `${minutes}:${String(seconds).padStart(2, '0')}`;
    }

    function editorTaskStorageKey(task){
      return String((task && (task.id || task.tempKey || task.name)) || 'editor-task');
    }

    function editorReadStorageJson(key, fallback){
      try{
        const raw = localStorage.getItem(key);
        if(!raw) return fallback;
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === 'object' ? parsed : fallback;
      }catch(_){
        return fallback;
      }
    }

    function editorReadTrackDraftStore(){
      return editorReadStorageJson(EDITOR_TRACK_DRAFTS_KEY, {});
    }

    function editorWriteTrackDraftStore(store){
      try{
        localStorage.setItem(EDITOR_TRACK_DRAFTS_KEY, JSON.stringify(store || {}));
      }catch(_){}
    }

    function editorLoadTrackDrafts(task){
      const prefix = `${editorTaskStorageKey(task)}::`;
      const store = editorReadTrackDraftStore();
      const drafts = {};
      Object.entries(store).forEach(([key, value]) => {
        if(!key.startsWith(prefix) || !value || typeof value !== 'object') return;
        drafts[key.slice(prefix.length)] = cloneClipState(value);
      });
      return drafts;
    }

    function editorPersistTrackDrafts(task, tracks){
      const prefix = `${editorTaskStorageKey(task)}::`;
      const store = editorReadTrackDraftStore();
      Object.keys(store).forEach((key) => {
        if(key.startsWith(prefix)){
          delete store[key];
        }
      });
      (Array.isArray(tracks) ? tracks : []).forEach((track) => {
        if(!track || track.key === 'source') return;
        store[`${prefix}${track.key}`] = cloneClipState(track.clip);
      });
      editorWriteTrackDraftStore(store);
    }

    function editorRestoreTrackDrafts(task, snapshot){
      const prefix = `${editorTaskStorageKey(task)}::`;
      const store = editorReadTrackDraftStore();
      Object.keys(store).forEach((key) => {
        if(key.startsWith(prefix)){
          delete store[key];
        }
      });
      Object.entries(snapshot || {}).forEach(([trackKey, clip]) => {
        store[`${prefix}${trackKey}`] = cloneClipState(clip);
      });
      editorWriteTrackDraftStore(store);
    }

      return `${String(taskId || '')}::${String(output || 'source')}::${Math.max(0, Math.round(Number(points) || 0))}`;

    function cachedEditorWaveformPayload(taskId, output = '', points = 1280){
      return editorWaveformPayloadCache.get(editorWaveformCacheKey(taskId, output, points)) || null;
    }

    const EDITOR_WAVEFORM_POINT_LEVELS = [
      640, 704, 768, 832, 896, 960, 1024, 1152, 1280, 1408, 1536, 1664, 1792, 1920, 2048,
      2304, 2560, 2816, 3072, 3328, 3584, 3840, 4096, 4608, 5120, 5632, 6144, 6656, 7168,
      7680, 8192, 9216, 10240, 11264, 12288, 13312, 14336, 15360, 16384, 18432, 20480,
      22528, 24576, 26624, 28672, 30720, 32768, 36864, 40960, 45056, 49152, 53248, 57344,
      61440, 65536, 73728, 81920, 90112, 98304, 106496, 114688, 122880, 131072,
    ];

    function bestCachedEditorWaveformPayload(taskId, output = '', targetPoints = 1280){
      const desired = Math.max(640, Math.min(131072, Math.round(Number(targetPoints) || 1280)));
      const preferred = EDITOR_WAVEFORM_POINT_LEVELS
        .filter((value) => value <= desired)
        .sort((a, b) => b - a);
      for(const points of preferred){
        const payload = cachedEditorWaveformPayload(taskId, output, points);
        if(payload) return payload;
      }
      for(const points of EDITOR_WAVEFORM_POINT_LEVELS){
        const payload = cachedEditorWaveformPayload(taskId, output, points);
        if(payload) return payload;
      }
      return null;
    }

    async function ensureEditorWaveformPayload(taskId, output = '', points = 1280){
      const normalizedPoints = Math.max(640, Math.min(131072, Math.round(Number(points) || 1280)));
      const cacheKey = editorWaveformCacheKey(taskId, output, normalizedPoints);
      if(editorWaveformPayloadCache.has(cacheKey)){
        return editorWaveformPayloadCache.get(cacheKey);
      }
      if(editorWaveformFetches.has(cacheKey)){
        return editorWaveformFetches.get(cacheKey);
      }
      const requested = String(output || '').trim();
      const url = requested
        ? `/api/tasks/${encodeURIComponent(taskId)}/waveform?output=${encodeURIComponent(requested)}&points=${normalizedPoints}`
        : `/api/tasks/${encodeURIComponent(taskId)}/waveform?points=${normalizedPoints}`;
      const fetchPromise = fetch(url)
        .then((response) => response.ok ? response.json() : null)
        .then((payload) => {
          if(payload && typeof payload === 'object'){
            editorWaveformPayloadCache.set(cacheKey, payload);
          }
          return payload;
        })
        .catch(() => null)
        .finally(() => {
          editorWaveformFetches.delete(cacheKey);
        });
      editorWaveformFetches.set(cacheKey, fetchPromise);
      return fetchPromise;
    }

    function primeTaskEditorAssets(task){
      if(!task || !task.id) return;
      [640, 768, 896, 1024, 1152, 1280, 1536, 1792, 2048].forEach((points) => {
        void ensureEditorWaveformPayload(task.id, '', points);
      });
      if(String(task.stage || '').toLowerCase() === 'done' && Array.isArray(task.outputs)){
        task.outputs.forEach((output) => {
          if(!output) return;
          [640, 768, 896, 1024, 1280, 1536].forEach((points) => {
            void ensureEditorWaveformPayload(task.id, String(output), points);
          });
        });
      }
    }
