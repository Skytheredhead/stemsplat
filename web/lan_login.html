<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#163642" />
  <title>stemsplat</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #0F2027;
      --bg-2: #2C5364;
      --txt-main: #E7ECEF;
      --txt-dim: #B8C4CC;
      --card: rgba(23, 35, 41, 0.58);
      --border: rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; margin: 0; }
    html {
      background: linear-gradient(135deg, #0B1A1F 0%, var(--bg-1) 35%, var(--bg-2) 100%);
      font-family: "Nunito Sans", system-ui, sans-serif;
      color: var(--txt-main);
    }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: transparent;
      overflow: hidden;
      padding: 32px;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      inset: -20vh 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(0,0,0,.18), rgba(0,0,0,0) 18%, rgba(255,255,255,.03) 50%, rgba(0,0,0,0) 82%, rgba(0,0,0,.16)),
        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/></filter><rect width="120" height="120" filter="url(%23n)" opacity="0.035"/></svg>') repeat;
      opacity: .22;
    }
    .card {
      width: min(420px, 100%);
      padding: 28px 24px 22px;
      border-radius: 28px;
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(14px) saturate(112%);
      -webkit-backdrop-filter: blur(14px) saturate(112%);
      box-shadow: 0 24px 64px rgba(0,0,0,.34);
    }
    .brand {
      font-size: clamp(44px, 8vw, 68px);
      line-height: 1;
      font-weight: 300;
      letter-spacing: .02em;
      text-align: center;
      margin: 0 0 28px;
      text-shadow: 0 8px 40px rgba(0,0,0,.45);
    }
    .label {
      display: block;
      font-size: 13px;
      color: var(--txt-dim);
      margin-bottom: 10px;
      text-transform: lowercase;
    }
    .field {
      width: 100%;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      background: rgba(255,255,255,.08);
      color: var(--txt-main);
      padding: 14px 16px;
      font: inherit;
      outline: none;
      transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
    }
    .field:focus {
      border-color: rgba(255,255,255,.24);
      box-shadow: 0 0 0 4px rgba(255,255,255,.06);
      background: rgba(255,255,255,.1);
    }
    .button {
      width: 100%;
      margin-top: 14px;
      border: 0;
      border-radius: 16px;
      background: rgba(255,255,255,.92);
      color: #091219;
      padding: 13px 16px;
      font: inherit;
      font-weight: 700;
      text-transform: lowercase;
      cursor: pointer;
      transition: transform .16s ease, opacity .16s ease;
    }
    .button:hover { transform: translateY(-1px); }
    .button:disabled { opacity: .58; cursor: default; transform: none; }
    .message {
      min-height: 20px;
      margin-top: 12px;
      text-align: center;
      font-size: 13px;
      color: #ffc7c7;
      opacity: 0;
      transition: opacity .16s ease;
    }
    .message.visible { opacity: 1; }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="brand">stemsplat</h1>
    <form id="login-form" novalidate>
      <label class="label" for="passcode">lan passcode</label>
      <input id="passcode" class="field" type="password" maxlength="24" autocomplete="current-password" spellcheck="false" />
      <button id="submit-btn" class="button" type="submit">enter</button>
      <div id="message" class="message" aria-live="polite"></div>
    </form>
  </main>

  <script>
    const form = document.getElementById('login-form');
    const input = document.getElementById('passcode');
    const submitBtn = document.getElementById('submit-btn');
    const message = document.getElementById('message');

    function setMessage(text){
      message.textContent = text || '';
      message.classList.toggle('visible', !!text);
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const passcode = input.value || '';
      submitBtn.disabled = true;
      setMessage('');
      try{
        const response = await fetch('/api/lan_auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ passcode }),
        });
        const data = await response.json().catch(() => ({}));
        if(!response.ok){
          setMessage(data && data.error ? String(data.error) : 'incorrect passcode');
          input.select();
          return;
        }
        window.location.replace('/');
      }catch(_error){
        setMessage('could not verify passcode');
      }finally{
        submitBtn.disabled = false;
      }
    });

    setTimeout(() => input.focus(), 60);
  </script>
</body>
</html>
